  const valsFns = {
    cnt: (r, ck)     => r?.[ck] ?? null,
    rpu: (r, ck, rk) => { const c=r?.[ck]||0,v=r?.[rk]||0; return c>0?Math.round(v/c):null; },
    rev: (r, ck, rk) => r?.[rk] ?? null,
  };
  const fn = valsFns[key], fmtKey = fmtKeys[key];
  const ctx = document.getElementById('ut_ytd_ch');
  if (!ctx) return;
  const ex = charts.find(c => c.canvas?.id === 'ut_ytd_ch');
  if (ex) { ex.destroy(); charts.splice(charts.indexOf(ex), 1); }
  const datasets = utCountKeys.map((ck, i) => {
    const rk = utRevKeys[i];
    const data = nows.map(r => fn(r, ck, rk));
    return {
      label: utBucketLabels[i], data,
      borderColor: utBucketColors[i], backgroundColor:'transparent',
      fill:false, tension:.25, pointRadius:4, pointHoverRadius:6, borderWidth:2.2,
      datalabels:{ anchor:'top', align:'top', offset:2, font:{size:8,weight:'bold'}, color:utBucketColors[i],
        formatter: v => v==null?'':fmtAxis(v,fmtKey) },
    };
  });
  const allV = datasets.flatMap(d=>d.data).filter(v=>v!=null&&isFinite(v));
  const mn=allV.length?Math.min(...allV):0, mx=allV.length?Math.max(...allV):1, p=(mx-mn)*.15||mx*.1||1;
  const inst = new Chart(ctx, {
    type:'line', data:{ labels:lbls, datasets },
    options:{ responsive:true, maintainAspectRatio:false, layout:{padding:{top:20}},
      plugins:{ legend:{labels:{font:{size:10},boxWidth:10,usePointStyle:true}}, datalabels:{} },
      scales:{ x:{ticks:{font:{size:10}}}, y:{suggestedMin:mn-p,suggestedMax:mx+p,ticks:{font:{size:10},callback:v=>fmtAxis(v,fmtKey)}} },
    },
  });
  charts.push(inst);
}

function switchWayType(key) {
  _wayMode = key;
  const ds = getDatasets();
  // 토글 버튼 상태 갱신
  document.querySelectorAll('.wt-toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.key === key);
    const wDef = WT_DEFS.find(w => w.key === b.dataset.key);
    b.style.borderColor   = b.dataset.key === key ? wDef.color : 'transparent';
    b.style.color         = b.dataset.key === key ? wDef.color : '#6b7280';
    b.style.background    = b.dataset.key === key ? wDef.color + '12' : 'none';
  });
  // 내용만 교체
  document.getElementById('wtContent').innerHTML = buildWtContent(ds);
  renderWaytypeCharts(ds);
}

function buildWtContent(ds) {
  const w   = WT_DEFS.find(d => d.key === _wayMode);
  const _li = ds.futureFrom != null ? ds.futureFrom - 1 : ds.now.length - 1;
  const W1  = ds.now[_li] ?? null, W2 = ds.now[_li - 1] ?? null, Y1 = ds.yoy[_li] ?? null;

  const cur  = W1?.[w.count]  ?? null;
  const prev = W2?.[w.count]  ?? null;
  const yoyv = Y1?.[w.count]  ?? null;
  const rev  = W1?.[w.rev]    ?? null;
  const hrs  = W1?.[w.hours]  ?? null;
  const rph  = (rev && hrs > 0) ? Math.round(rev / hrs) : null;
  const wowC = pctChg(cur, prev), yoyC = pctChg(cur, yoyv);

  const momLabel = periodChgLabel().trim();
  const chgBadge = (v) => v == null ? '' :
    `<span style="font-size:11px;color:${v>0?'#166534':'#991b1b'}">${momLabel} ${v>0?'+':''}${v.toFixed(1)}%</span>`;
  const yoyBadge = v => v == null ? '' :
    `<span style="font-size:11px;color:#9ca3af">YoY ${v>0?'+':''}${v.toFixed(1)}%</span>`;

  // KPI 4개
  const kpiRow = `
    <div class="wt-kpi-row">
      <div class="wt-kpi" style="border-left:3px solid ${w.color}">
        <div class="wt-kpi-lbl">이용건수</div>
        <div class="wt-kpi-val">${fmt(cur,'cnt')}건</div>
        <div class="wt-kpi-chg">${chgBadge(wowC,'WoW')} ${yoyBadge(yoyC)}</div>
      </div>
      <div class="wt-kpi" style="border-left:3px solid ${w.color}">
        <div class="wt-kpi-lbl">건당 매출</div>
        <div class="wt-kpi-val">${fmt(rev,'krw')}원</div>
        <div class="wt-kpi-chg">${chgBadge(pctChg(rev, W2?.[w.rev]))} ${yoyBadge(pctChg(rev, Y1?.[w.rev]))}</div>
      </div>
      <div class="wt-kpi" style="border-left:3px solid ${w.color}">
        <div class="wt-kpi-lbl">시간당 매출</div>
        <div class="wt-kpi-val">${rph != null ? fmt(rph,'krw')+'원/h' : '-'}</div>
        <div class="wt-kpi-chg">${(() => {
          const rph2 = (W2?.[w.rev] && W2?.[w.hours] > 0) ? Math.round(W2[w.rev] / W2[w.hours]) : null;
          const rphY = (Y1?.[w.rev] && Y1?.[w.hours] > 0) ? Math.round(Y1[w.rev] / Y1[w.hours]) : null;
          return chgBadge(pctChg(rph, rph2)) + ' ' + yoyBadge(pctChg(rph, rphY));
        })()}</div>
      </div>
      <div class="wt-kpi" style="border-left:3px solid ${w.color}">
        <div class="wt-kpi-lbl">평균 이용시간</div>
        <div class="wt-kpi-val">${fmt(hrs,'hr')}h</div>
        <div class="wt-kpi-chg">${chgBadge(pctChg(hrs, W2?.[w.hours]))} ${yoyBadge(pctChg(hrs, Y1?.[w.hours]))}</div>
      </div>
    </div>`;

  // 이용 구간 분포 (최근 기준)
  const utKeys    = ['u_0to4h','u_4to8h','u_8to24h','u_24plus'];
  const utRevKeys = ['u_0to4h_rev','u_4to8h_rev','u_8to24h_rev','u_24plus_rev'];
  const utLabels  = ['0~4h','4~8h','8~24h','24h+'];
  const utColors  = ['#93c5fd','#3b82f6','#6d28d9','#1e3a8a'];
  const utTotal   = utKeys.reduce((s,k) => s + (W1?.[k]||0), 0);
  const distBars = utTotal > 0 ? utKeys.map((k,i) => {
    const v = W1?.[k]||0, pct = v/utTotal*100;
    return `<div style="display:grid;grid-template-columns:40px 1fr 48px 64px;align-items:center;gap:8px;font-size:11px;padding:3px 0">
      <span style="display:flex;align-items:center;gap:5px">
        <span style="width:9px;height:9px;border-radius:2px;background:${utColors[i]};flex-shrink:0;display:inline-block"></span>
        <span style="font-weight:600;color:#374151">${utLabels[i]}</span>
      </span>
      <div style="background:#f1f5f9;border-radius:3px;height:7px;overflow:hidden">
        <div style="background:${utColors[i]};width:${pct.toFixed(1)}%;height:100%;border-radius:3px"></div>
      </div>
      <span style="font-weight:700;color:#111827;text-align:right">${pct.toFixed(1)}%</span>
      <span style="color:#6b7280;text-align:right">${fmt(v,'cnt')}건</span>
    </div>`;
  }).join('') : '<span style="color:#9ca3af;font-size:12px">데이터 없음</span>';

  // 이용 구간 추이 차트 섹션 (Weekly/Monthly: 3개 차트, YTD: 토글+1개)
  const isYtdMode = period === 'ytd';
  // 4개 소형 차트 행 빌더
  const utBucketRow = (metricKey, title) => `
    <div class="chart-card" style="margin-top:10px">
      <div class="chart-hdr">${title}</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 10px 10px">
        ${utLabels.map((lbl,i) => `
          <div>
            <div style="font-size:10px;font-weight:600;color:${utColors[i]};margin-bottom:4px;text-align:center">${lbl}</div>
            <div style="height:130px;position:relative"><canvas id="ut_${metricKey}_${i}"></canvas></div>
          </div>`).join('')}
      </div>
    </div>`;

  const utTrendSection = isYtdMode ? `
    <div class="chart-card" style="margin-top:12px">
      <div class="chart-hdr" style="display:flex;align-items:center;gap:10px">
        <span>이용 구간별 추이</span>
        <div style="display:flex;gap:4px;margin-left:auto">
          <button id="utBtn_cnt" class="util-toggle-btn active" onclick="switchUtMetric('cnt')">이용건수</button>
          <button id="utBtn_rpu" class="util-toggle-btn" onclick="switchUtMetric('rpu')">건당 매출</button>
          <button id="utBtn_rev" class="util-toggle-btn" onclick="switchUtMetric('rev')">총 매출</button>
        </div>
      </div>
      <div class="chart-wrap" style="height:280px"><canvas id="ut_ytd_ch"></canvas></div>
    </div>` :
    utBucketRow('cnt','이용건수 추이') +
    utBucketRow('rpu','건당 매출 추이 (원)') +
    utBucketRow('rev','총 매출 추이 (원)');

  return `
    ${kpiRow}
    <div class="chart-grid cols2" style="margin-top:12px">
      <div class="chart-card"><div class="chart-hdr">이용건수 추이</div>
        <div class="chart-wrap"><canvas id="wt_cnt_ch"></canvas></div></div>
      <div class="chart-card"><div class="chart-hdr">건당매출 추이 (원)</div>
        <div class="chart-wrap"><canvas id="wt_rpu_ch"></canvas></div></div>
      <div class="chart-card"><div class="chart-hdr">시간당매출 추이 (원/h)</div>
        <div class="chart-wrap"><canvas id="wt_rph_ch"></canvas></div></div>
      <div class="chart-card"><div class="chart-hdr">평균 이용시간 추이 (h)</div>
        <div class="chart-wrap"><canvas id="wt_avg_ch"></canvas></div></div>
    </div>
    <div class="chart-card" style="margin-top:12px">
      <div class="chart-hdr">이용 구간 분포 (최근 기준)</div>
      <div style="display:flex;align-items:center;gap:20px;padding:10px 16px">
        <canvas id="ut_pie_ch" width="90" height="90" style="flex-shrink:0"></canvas>
        <div style="flex:1;min-width:0">${distBars}</div>
      </div>
    </div>
    ${utTrendSection}`;
}

function renderWaytype(ds) {
  const toggleBtns = WT_DEFS.map(w => {
    const active = w.key === _wayMode;
    return `<button class="wt-toggle-btn${active?' active':''}" data-key="${w.key}"
      onclick="switchWayType('${w.key}')"
      style="border-color:${active?w.color:'transparent'};color:${active?w.color:'#6b7280'};background:${active?w.color+'12':'none'}">
      ${w.label}
    </button>`;
  }).join('');

  return `
    <div class="metric-section">
      <div class="wt-toggle-bar">${toggleBtns}</div>
      <div id="wtContent">${buildWtContent(ds)}</div>
    </div>`;
}

function renderWaytypeCharts(ds) {
  const w    = WT_DEFS.find(d => d.key === _wayMode);
  // YTD 모드에서 미래 null 제거 — 실제 데이터만 사용
  const cutIdx = ds.futureFrom != null ? ds.futureFrom : ds.now.length;
  const nows = ds.now.slice(0, cutIdx);
  const yoys = ds.yoy.slice(0, cutIdx);
  const lbls = ds.labels.slice(0, cutIdx);
  const yoyColor = '#94a3b8';

  function makeWtChart(id, nowVals, yoyVals, fmtKey, yAxisLabel) {
    const ctx = document.getElementById(id);
    if (!ctx) return;
    // 기존 인스턴스 제거
    const ex = charts.find(c => c.canvas?.id === id);
    if (ex) { ex.destroy(); charts.splice(charts.indexOf(ex), 1); }
    const inst = new Chart(ctx, {
      type: 'line',
      data: { labels: lbls, datasets: [
        {
          label: `${w.label} (2026)`,
          data: nowVals, borderColor: w.color, backgroundColor: w.color+'18',
          fill: true, tension:.25, pointRadius:5, pointHoverRadius:7, borderWidth:2.5,
          datalabels: {
            anchor:'top', align:'top', offset:2,
            font:{size:9,weight:'bold'}, color: w.color,
            formatter: v => v==null?'':fmtAxis(v, fmtKey),
          },
        },
        {
          label: `${w.label} (2025)`,
          data: yoyVals, borderColor: yoyColor, backgroundColor:'transparent',
          fill:false, borderDash:[4,3], tension:.25,
          pointRadius:3, borderWidth:1.5,
          datalabels:{display:false},
        },
      ]},
      options: {
        responsive:true, maintainAspectRatio:false,
        layout:{padding:{top:22}},
        plugins: {
          legend:{labels:{font:{size:10},boxWidth:10,usePointStyle:true}},
          datalabels:{},
        },
        scales: {
          x:{ticks:{font:{size:10}}},
          y:{
            suggestedMin: (() => { const a=[...nowVals,...yoyVals].filter(v=>v!=null&&isFinite(v)); if(!a.length)return 0; const mn=Math.min(...a),mx=Math.max(...a),p=(mx-mn)*.15||mx*.1||1; return mn-p; })(),
            suggestedMax: (() => { const a=[...nowVals,...yoyVals].filter(v=>v!=null&&isFinite(v)); if(!a.length)return 1; const mn=Math.min(...a),mx=Math.max(...a),p=(mx-mn)*.15||mx*.1||1; return mx+p; })(),
            ticks:{font:{size:10}, callback: v => fmtAxis(v,fmtKey)},
          },
        },
      },
    });
    charts.push(inst);
  }

  const get = (rows, key) => rows.map(r => r?.[key] ?? null);
  const getRph = (rows, rk, hk) => rows.map(r => {
    const rev = r?.[rk] ?? null, hrs = r?.[hk] ?? null;
    return (rev != null && hrs > 0) ? Math.round(rev / hrs) : null;
  });
  const getYoy = (nowR, key) => nowR.map(r => {
    const match = yoys.find(y => y.isoweek === r.isoweek);
    return match?.[key] ?? null;
  });
  const getYoyRph = (nowR, rk, hk) => nowR.map(r => {
    const match = yoys.find(y => y.isoweek === r.isoweek);
    if (!match) return null;
    const rev = match[rk] ?? null, hrs = match[hk] ?? null;
    return (rev != null && hrs > 0) ? Math.round(rev / hrs) : null;
  });

  makeWtChart('wt_cnt_ch', get(nows, w.count),  getYoy(nows, w.count),  'cnt',    '건');
  makeWtChart('wt_rpu_ch', get(nows, w.rev),     getYoy(nows, w.rev),    'krw',    '원');
  makeWtChart('wt_rph_ch', getRph(nows, w.rev, w.hours), getYoyRph(nows, w.rev, w.hours), 'krw', '원/h');
  makeWtChart('wt_avg_ch', get(nows, w.hours),   getYoy(nows, w.hours),  'hr',     'h');

  // ── 이용 구간별 추이 차트 ──
  const utCountKeys = ['u_0to4h','u_4to8h','u_8to24h','u_24plus'];
  const utRevKeys   = ['u_0to4h_rev','u_4to8h_rev','u_8to24h_rev','u_24plus_rev'];
  const utBucketLabels = ['0~4h','4~8h','8~24h','24h+'];
  const utBucketColors = ['#93c5fd','#3b82f6','#6d28d9','#1e3a8a'];

  // valsFn(row, cntKey, revKey) → value
  function makeUtBucketChart(id, valsFn, fmtKey) {
    const ctx = document.getElementById(id);
    if (!ctx) return;
    const ex = charts.find(c => c.canvas?.id === id);
    if (ex) { ex.destroy(); charts.splice(charts.indexOf(ex), 1); }
    const datasets = utCountKeys.map((ck, i) => {
      const rk = utRevKeys[i];
      const data = nows.map(r => valsFn(r, ck, rk));
      return {
        label: utBucketLabels[i], data,
        borderColor: utBucketColors[i], backgroundColor: 'transparent',
        fill: false, tension:.25,
        pointRadius: nows.length <= 8 ? 4 : 2,
        pointHoverRadius: 6, borderWidth: 2.2,
        datalabels: {
          anchor:'top', align:'top', offset:2,
          font:{size:8,weight:'bold'}, color: utBucketColors[i],
          display: ctx => nows.length <= 8,
          formatter: v => v==null?'':fmtAxis(v, fmtKey),
        },
      };
    });
    const allV = datasets.flatMap(d=>d.data).filter(v=>v!=null&&isFinite(v));
    const mn = allV.length?Math.min(...allV):0, mx = allV.length?Math.max(...allV):1;
    const p = (mx-mn)*.15||mx*.1||1;
    const inst = new Chart(ctx, {
      type:'line',
      data:{ labels: lbls, datasets },
      options:{
        responsive:true, maintainAspectRatio:false,
        layout:{padding:{top:20}},
        plugins:{
          legend:{labels:{font:{size:10},boxWidth:10,usePointStyle:true}},
          datalabels:{},
        },
        scales:{
          x:{ticks:{font:{size:10}}},
          y:{suggestedMin:mn-p, suggestedMax:mx+p, ticks:{font:{size:10},callback:v=>fmtAxis(v,fmtKey)}},
        },
      },
    });
    charts.push(inst);
    return inst;
  }

  const utValsFns = {
    cnt: (r, ck)     => r?.[ck] ?? null,
    rpu: (r, ck, rk) => { const c=r?.[ck]||0,v=r?.[rk]||0; return c>0?Math.round(v/c):null; },
    rev: (r, ck, rk) => r?.[rk] ?? null,
  };
  const utFmtKeys = { cnt:'cnt', rpu:'krw', rev:'krw' };

  // 버킷 i 하나짜리 소형 차트 (현재+YoY)
  function makeUtMiniChart(id, nowVals, yoyVals, fmtKey, color) {
    const ctx = document.getElementById(id);
    if (!ctx) return;
    const ex = charts.find(c => c.canvas?.id === id);
    if (ex) { ex.destroy(); charts.splice(charts.indexOf(ex), 1); }
    const allV = [...nowVals, ...yoyVals].filter(v => v != null && isFinite(v));
    const mn = allV.length ? Math.min(...allV) : 0;
    const mx = allV.length ? Math.max(...allV) : 1;
    const p  = (mx - mn) * 0.15 || mx * 0.1 || 1;
    const inst = new Chart(ctx, {
      type: 'line',
      data: { labels: lbls, datasets: [
        { label:'2026', data: nowVals, borderColor: color, backgroundColor: color+'22',
          fill: true, tension:.3, pointRadius:3, pointHoverRadius:5, borderWidth:2,
          datalabels:{ anchor:'top', align:'top', offset:1, font:{size:8,weight:'bold'}, color,
            formatter: v => v==null?'':fmtAxis(v,fmtKey) } },
        { label:'2025', data: yoyVals, borderColor:'#94a3b8', backgroundColor:'transparent',
          fill:false, borderDash:[3,3], tension:.3, pointRadius:2, borderWidth:1.5,
          datalabels:{display:false} },
      ]},
      options:{
        responsive:true, maintainAspectRatio:false,
        layout:{padding:{top:16, right:4}},
        plugins:{ legend:{display:false}, datalabels:{} },
        scales:{
          x:{ticks:{font:{size:9}, maxRotation:0}},
          y:{suggestedMin:mn-p, suggestedMax:mx+p,
             ticks:{font:{size:8}, maxTicksLimit:4, callback:v=>fmtAxis(v,fmtKey)}},
        },
      },
    });
    charts.push(inst);
  }

  if (period === 'ytd') {
    makeUtBucketChart('ut_ytd_ch', utValsFns[_utMetric], utFmtKeys[_utMetric]);
  } else {
    // Weekly/Monthly: 지표별로 버킷 4개 소형 차트
    const metricsToRender = [
      { key:'cnt', fmtKey:'cnt',  nowFn:(r,ck)=>r?.[ck]??null, yoyFn:(r,ck)=>r?.[ck]??null },
      { key:'rpu', fmtKey:'krw',  nowFn:(r,ck,rk)=>{const c=r?.[ck]||0,v=r?.[rk]||0;return c>0?Math.round(v/c):null;},
                                   yoyFn:(r,ck,rk)=>{const c=r?.[ck]||0,v=r?.[rk]||0;return c>0?Math.round(v/c):null;} },
      { key:'rev', fmtKey:'krw',  nowFn:(r,ck,rk)=>r?.[rk]??null, yoyFn:(r,ck,rk)=>r?.[rk]??null },
    ];
    metricsToRender.forEach(m => {
      utCountKeys.forEach((ck, i) => {
        const rk = utRevKeys[i];
        const color = utBucketColors[i];
        const nowVals = nows.map(r => m.nowFn(r, ck, rk));
        // YoY: 같은 인덱스의 yoy 데이터
        const yoyVals = yoys.map(r => r ? m.yoyFn(r, ck, rk) : null);
        makeUtMiniChart(`ut_${m.key}_${i}`, nowVals, yoyVals, m.fmtKey, color);
      });
    });
  }

  // 이용 구간 도넛
  const pieCtx = document.getElementById('ut_pie_ch');
  if (pieCtx && nows.length) {
    const ex = charts.find(c => c.canvas?.id === 'ut_pie_ch');
    if (ex) { ex.destroy(); charts.splice(charts.indexOf(ex), 1); }
    const W1last = nows.at(-1);
    const inst = new Chart(pieCtx, {
      type:'doughnut',
      data:{ labels:utBucketLabels, datasets:[{
        data: utCountKeys.map(k=>W1last?.[k]||0),
        backgroundColor: utBucketColors, borderWidth:1
      }] },
      options:{ responsive:false, plugins:{legend:{display:false},datalabels:{display:false}} },
    });
    charts.push(inst);
  }
}

/* ═══════════════════════════════════════════
   Region selector (two-box: 광역 + 시군구)
═══════════════════════════════════════════ */
let _selectedR1 = '';   // '' | '경기도' | '강원도'
let _selectedR2 = '';   // city name or ''

function populateRegionDropdown() {
  const r2data = D.weekly_region2 || [];
  _r2byRegion1 = {
    '경기도': [...new Set(r2data.filter(r=>r.region1==='경기도').map(r=>r.region))].sort(),
    '강원도': [...new Set(r2data.filter(r=>r.region1==='강원도' || r.region1==='강원특별자치도').map(r=>r.region))].sort(),
  };
  _refreshR2Buttons();
}

function _refreshR1Buttons() {
  document.querySelectorAll('#r1Btns .rbtn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === _selectedR1);
  });
}

function _refreshR2Buttons() {
  const box = document.getElementById('r2Box');
  const inner = document.getElementById('r2Btns');
  const cities = _r2byRegion1 ? (_r2byRegion1[_selectedR1] || []) : [];
  if (!_selectedR1 || !cities.length) { box.style.display = 'none'; return; }
  box.style.display = '';
  inner.innerHTML = cities.map(c =>
    `<button class="rbtn${_selectedR2===c?' active':''}" data-val="${c}" onclick="setR2('${c}')">${c}</button>`
  ).join('');
}

function setR1(r1) {
  _selectedR1 = r1;
  _selectedR2 = '';
  region = r1;
  regionLevel = r1 ? 1 : 0;
  _refreshR1Buttons();
  _refreshR2Buttons();
  render();
}

function setR2(r2) {
  _selectedR2 = r2;
  region = r2;
  regionLevel = 2;
  _refreshR2Buttons();
  render();
}

function selectRegion(rg, level) {
  regionLevel = level;
  region = rg;
  if (level === 1) { _selectedR1 = rg; _selectedR2 = ''; }
  else if (level === 2) { _selectedR2 = rg; }
  _refreshR1Buttons();
  _refreshR2Buttons();
  render();
}

function drillRegion2(name) {
  // figure out which r1 this city belongs to
  if (_r2byRegion1) {
    for (const r1 of ['경기도','강원도']) {
      if ((_r2byRegion1[r1]||[]).includes(name)) { _selectedR1 = r1; break; }
    }
  }
  setR2(name);
}

function appendMsg(role, content) {
  const container = document.getElementById('chatMessages');
  // Remove empty state
  container.querySelectorAll('.chat-empty').forEach(e => e.remove());

  const now = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  div.innerHTML = `<div class="chat-bubble">${escHtml(content)}</div>
    <div class="chat-meta">${now}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendAiMsg(content) {
  const container = document.getElementById('chatMessages');
  container.querySelectorAll('.chat-empty').forEach(e => e.remove());
  const now = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  const div = document.createElement('div');
  div.className = 'chat-msg ai';
  // Render markdown-like formatting
  const rendered = (content || '(응답 없음)')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/### (.*?)(\n|$)/g, '<div style="font-weight:700;color:#1e293b;margin-top:8px;margin-bottom:2px">$1</div>')
    .replace(/## (.*?)(\n|$)/g, '<div style="font-weight:800;color:#0064FF;margin-top:10px;margin-bottom:3px">$1</div>')
    .replace(/\n/g, '<br>');
  div.innerHTML = `<div class="chat-bubble" style="max-width:100%">${rendered}</div>
    <div class="chat-meta">${now}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chatInput');

  if (!text || chatBusy || !aiConfigured) return;
  input.value = '';
  input.blur();   // IME 조합 상태 초기화
  input.focus();
  input.style.height = 'auto';
  await runAI(text);
}

async function quickAnalyze(type) {

  let prompt;
  if (type === 'current') prompt = buildPrompt('auto');

  await runAI(null, prompt);
}

function buildDataContext() {
  if (!D?.weekly?.length) return '';
  const pct = (v, base) => { if (v==null||base==null||base===0) return '-'; const c=((v-base)/Math.abs(base)*100); return (c>0?'+':'')+c.toFixed(1)+'%'; };

  // ── 전체 팀 W-1 / W-2 / YoY ── (현재 화면 필터 무관)
  const nowRows = D.weekly.filter(r => r.period_type === 'now').sort((a,b) => a.isoyear!==b.isoyear ? a.isoyear-b.isoyear : a.isoweek-b.isoweek);
  const yoyRows = D.weekly.filter(r => r.period_type === 'yoy').sort((a,b) => a.isoyear!==b.isoyear ? a.isoyear-b.isoyear : a.isoweek-b.isoweek);
  const W1 = nowRows.at(-1), W2 = nowRows.at(-2), Y1 = yoyRows.at(-1);
  if (!W1) return '';
  const isoweek = W1.isoweek, isoyear = W1.isoyear;

  const lines = [
    `[경기강원 전체 실적 컨텍스트] W${isoweek}(${isoyear}) 기준 — 현재 화면과 무관하게 팀 전체 데이터 제공`,
    `대당매출: ${fmt(W1.rev_per_car,'krw')}원 (WoW ${pct(W1.rev_per_car,W2?.rev_per_car)}, YoY ${pct(W1.rev_per_car,Y1?.rev_per_car)})`,
    `GPM: ${W1.gpm!=null?(W1.gpm*100).toFixed(1)+'%':'-'} (WoW ${pct(W1.gpm,W2?.gpm)}, YoY ${pct(W1.gpm,Y1?.gpm)})`,
    `주중가동률: ${W1.opr_weekday!=null?(W1.opr_weekday*100).toFixed(1)+'%':'-'} / 주말가동률: ${W1.opr_weekend!=null?(W1.opr_weekend*100).toFixed(1)+'%':'-'}`,
    `이용건수: ${fmt(W1.use_count,'cnt')}건 (WoW ${pct(W1.use_count,W2?.use_count)}, YoY ${pct(W1.use_count,Y1?.use_count)})`,
    `왕복 ${fmt(W1.round_count,'cnt')}건(${fmt(W1.round_rev_per_use,'krw')}원, 평균${W1.round_avg_hours?.toFixed(1)}h) / 편도 ${fmt(W1.oneway_count,'cnt')}건(${fmt(W1.oneway_rev_per_use,'krw')}원, 평균${W1.oneway_avg_hours?.toFixed(1)}h) / 부름 ${fmt(W1.d2d_count,'cnt')}건(${fmt(W1.d2d_rev_per_use,'krw')}원, 평균${W1.d2d_avg_hours?.toFixed(1)}h)`,
    (() => { const t=(W1.u_0to4h||0)+(W1.u_4to8h||0)+(W1.u_8to24h||0)+(W1.u_24plus||0); return t ? `이용시간 분포: 0~4h ${Math.round(W1.u_0to4h/t*100)}% / 4~8h ${Math.round(W1.u_4to8h/t*100)}% / 8~24h ${Math.round(W1.u_8to24h/t*100)}% / 24h+ ${Math.round(W1.u_24plus/t*100)}%` : ''; })(),
    `수요접속: ${fmt(W1.attempt,'cnt')}건, 실패율: ${W1.fail_rate!=null?(W1.fail_rate*100).toFixed(1)+'%':'-'}, 결제시도: ${fmt(W1.payment_attempt,'cnt')}건`,
    `운영대수: ${fmt(W1.car_count,'cnt')}대 / 총매출: ${fmt(W1.revenue,'krw')}원`,
  ];

  // ── 경기도/강원도 구분 ──
  if (D?.weekly_region2?.length) {
    const r1Groups = {};
    for (const row of D.weekly_region2) {
      if (row.isoweek !== isoweek || row.isoyear !== isoyear || row.period_type !== 'now') continue;
      const r1 = row.region1 || '';
      const key = r1.includes('강원') ? '강원도' : r1.includes('경기') ? '경기도' : r1;
      if (!key) continue;
      if (!r1Groups[key]) r1Groups[key] = { revenue:0, use_count:0, rev_total:0, car_total:0 };
      r1Groups[key].revenue   += row.revenue   || 0;
      r1Groups[key].use_count += row.use_count || 0;
      r1Groups[key].rev_total += row.revenue   || 0;
      r1Groups[key].car_total += row.car_count || 0;
    }
    const r1Lines = Object.entries(r1Groups).map(([name, g]) => {
      const rpc = g.car_total > 0 ? Math.round(g.rev_total / g.car_total) : 0;
      return `  ${name}: 대당매출 ${fmt(rpc,'krw')}원, 이용건수 ${fmt(g.use_count,'cnt')}건, 총매출 ${fmt(g.revenue,'krw')}원`;
    });
    if (r1Lines.length) lines.push(`[경기/강원 구분]\n${r1Lines.join('\n')}`);
  }

  // ── 시군구(region2)별 주간 실적 ──
  if (D?.weekly_region2?.length) {
    const r2nowMap = {}, r2yoyMap = {};
    for (const row of D.weekly_region2) {
      if (row.isoweek !== isoweek || row.isoyear !== isoyear) continue;
      const key = row.region || '';
      if (!key) continue;
      if (row.period_type === 'now') r2nowMap[key] = row;
      else if (row.period_type === 'yoy') r2yoyMap[key] = row;
    }
    const r2Lines = Object.entries(r2nowMap).map(([name, r]) => {
      const y = r2yoyMap[name];
      const rpc = r.rev_per_car ? Math.round(r.rev_per_car) : 0;
      const yRpc = y?.rev_per_car ? Math.round(y.rev_per_car) : null;
      const t = (r.u_0to4h||0)+(r.u_4to8h||0)+(r.u_8to24h||0)+(r.u_24plus||0);
      const timeDist = t ? ` | 이용시간 0~4h ${Math.round(r.u_0to4h/t*100)}% 4~8h ${Math.round(r.u_4to8h/t*100)}% 8~24h ${Math.round(r.u_8to24h/t*100)}% 24h+ ${Math.round((r.u_24plus||0)/t*100)}%` : '';
      const waytypeStr = ` | 왕복 ${fmt(r.round_count,'cnt')}건(${fmt(r.round_rev_per_use,'krw')}원) 편도 ${fmt(r.oneway_count,'cnt')}건(${fmt(r.oneway_rev_per_use,'krw')}원) 부름 ${fmt(r.d2d_count,'cnt')}건(${fmt(r.d2d_rev_per_use,'krw')}원)`;
      return `  ${name}: 대당매출 ${fmt(rpc,'krw')}원${yRpc ? ` YoY${pct(rpc,yRpc)}` : ''}, ` +
        `주중가동 ${r.opr_weekday!=null?(r.opr_weekday*100).toFixed(1)+'%':'-'}, ` +
        `주말가동 ${r.opr_weekend!=null?(r.opr_weekend*100).toFixed(1)+'%':'-'}, ` +
        `이용 ${fmt(r.use_count,'cnt')}건, 운영 ${fmt(r.car_count,'cnt')}대` + waytypeStr + timeDist;
    });
    if (r2Lines.length) lines.push(`[시군구(region2)별 주간 실적 — W${isoweek}]\n${r2Lines.join('\n')}`);
  }

  // ── 사전가동률 (W, W+1, W+2) ──
  if (D?.advance_util?.meta) {
    const au = D.advance_util;
    const meta = au.meta;
    const fmtPct = v => (v != null && !isNaN(v)) ? (v * 100).toFixed(1) + '%' : '-';
    const fmtPp  = (nv, yv) => {
      if (nv == null || yv == null || isNaN(nv) || isNaN(yv)) return '';
      const d = (nv - yv) * 100;
      return ` YoY${d > 0 ? '+' : ''}${d.toFixed(1)}%p`;
    };
    const fmtWk = (nowWk, yoyWk) => {
      const nwd = nowWk?.weekday, nwe = nowWk?.weekend;
      const ywd = yoyWk?.weekday, ywe = yoyWk?.weekend;
      return `주중 ${fmtPct(nwd)}${fmtPp(nwd, ywd)} / 주말 ${fmtPct(nwe)}${fmtPp(nwe, ywe)}`;
    };

    // 팀 전체
    const totalLines = [
      `[사전가동률 — ${meta.snap_date} 스냅샷 기준 (팀 전체)]`,
      `  ${meta.w0_label}: ${fmtWk(au.now?.w0, au.yoy?.w0)}`,
      `  ${meta.w1_label}: ${fmtWk(au.now?.w1, au.yoy?.w1)}`,
      `  ${meta.w2_label}: ${fmtWk(au.now?.w2, au.yoy?.w2)}`,
    ];

    // 지역별 (by_region2)
    const r2entries = Object.entries(au.by_region2 || {}).filter(([k]) => k !== '__all__');
    if (r2entries.length) {
      totalLines.push('[사전가동률 — 지역별]');
      for (const [r2name, r2data] of r2entries) {
        totalLines.push(
          `  ${r2name}: ${meta.w0_label} ${fmtWk(r2data.now?.w0, r2data.yoy?.w0)} | ` +
          `${meta.w1_label} ${fmtWk(r2data.now?.w1, r2data.yoy?.w1)} | ` +
          `${meta.w2_label} ${fmtWk(r2data.now?.w2, r2data.yoy?.w2)}`
        );
      }
    }

    lines.push(totalLines.join('\n'));
  }

  // region3는 특정 시군구(region2) 선택 시에만 포함 (전체/도 단위 선택 시 토큰 절약)
  if (D?.weekly_region3?.length && regionLevel === 2) {
    const nowMap = {}, yoyMap = {};
    for (const row of D.weekly_region3) {
      if (row.isoweek !== isoweek || row.isoyear !== isoyear) continue;
      const key = `${row.region2_parent||''}>${row.region||''}`;
      if (row.period_type === 'now') nowMap[key] = row;
      else if (row.period_type === 'yoy') yoyMap[key] = row;
    }
    const r3Lines = Object.entries(nowMap).map(([key, r]) => {
      const y = yoyMap[key];
      const rpc = r.rev_per_car ? Math.round(r.rev_per_car) : 0;
      const yoyStr = y?.rev_per_car ? ` YoY${pct(rpc, Math.round(y.rev_per_car))}` : '';
      return `  ${key}: 대당매출 ${fmt(rpc,'krw')}원${yoyStr}, 주중가동 ${r.opr_weekday!=null?(r.opr_weekday*100).toFixed(1)+'%':'-'}, 주말가동 ${r.opr_weekend!=null?(r.opr_weekend*100).toFixed(1)+'%':'-'}, 이용건수 ${fmt(r.use_count,'cnt')}건, 운영대수 ${fmt(r.car_count,'cnt')}대`;
    });
    if (r3Lines.length) lines.push(`[읍면동(region3)별 실적 — 시군구>읍면동 형식]\n${r3Lines.join('\n')}`);
  }

  return lines.join('\n');
}

async function runAI(userText, prebuiltPrompt) {
  if (!aiConfigured || chatBusy) return;
  chatBusy = true;
  const setBtnsDisabled = (v) => document.querySelectorAll('.chat-action-btn, #chatSendBtn').forEach(b => b.disabled = v);
  setBtnsDisabled(true);

  // 자유 질문 시 현재 지표 컨텍스트 자동 첨부
  let userContent;
  if (prebuiltPrompt) {
    userContent = prebuiltPrompt;
  } else {
    const ctx = buildDataContext();
    userContent = ctx ? `${ctx}\n\n[질문] ${userText}` : userText;
  }
  const displayText = prebuiltPrompt
    ? (period === 'weekly' ? 'W-1 실적 분석 요청' : period === 'monthly' ? '월별 트렌드 분석 요청' : 'YTD 분석 요청')
    : userText;

  appendMsg('user', displayText);
  chatHistory.push({ role: 'user', content: userContent });

  // 전송할 messages 배열: 시스템 + 히스토리
  const messages = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...chatHistory,
  ];

  // Placeholder
  const phDiv = document.createElement('div');
  phDiv.className = 'chat-msg ai';
  phDiv.innerHTML = '<div class="chat-bubble"><span class="spin-blue"></span> 생각 중...</div>';
  document.getElementById('chatMessages').appendChild(phDiv);
  document.getElementById('chatMessages').scrollTop = 9999;

  try {
    const r = await fetch('/api/dashboard-analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages }),
    });
    const data = await r.json();
    phDiv.remove();
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    const aiText = data.result || '(응답 없음)';
    appendAiMsg(aiText);
    chatHistory.push({ role: 'assistant', content: aiText });
  } catch(e) {
    phDiv.remove();
    appendAiMsg('오류: ' + e.message);
    chatHistory.pop(); // 실패한 user 메시지 제거
  } finally {
    chatBusy = false;
    setBtnsDisabled(false);
  }
}

function buildPrompt(mode) {
  const ds = getDatasets();
  const _li2 = ds.futureFrom != null ? ds.futureFrom - 1 : ds.now.length - 1;
  const W1 = ds.now[_li2] ?? null, W2 = ds.now[_li2 - 1] ?? null, Y1 = ds.yoy[_li2] ?? null;
  const regionStr = region ? `[${region}] ` : '';
  const fmtRow = (w) => !w ? '-' : [
    `대당매출 ${fmt(w.rev_per_car,'krw')}원`,
    `GPM ${fmt(w.gpm,'pct')}`,
    `주중가동 ${fmt(w.opr_weekday,'pct')}`,
    `주말가동 ${fmt(w.opr_weekend,'pct')}`,
    `왕복 ${fmt(w.round_count,'cnt')}건/${fmt(w.round_rev_per_use,'krw')}원/${fmt(w.round_avg_hours,'hr')}h`,
    `편도 ${fmt(w.oneway_count,'cnt')}건/${fmt(w.oneway_rev_per_use,'krw')}원/${fmt(w.oneway_avg_hours,'hr')}h`,
    `부름 ${fmt(w.d2d_count,'cnt')}건/${fmt(w.d2d_rev_per_use,'krw')}원/${fmt(w.d2d_avg_hours,'hr')}h`,
    `수요 ${fmt(w.attempt,'cnt')}건 실패율 ${fmt(w.fail_rate,'pct')}`,
  ].join(' | ');
  const periodStr = period === 'weekly' ? `${regionStr}W-1(${W1?.isoweek}주차) 기준` : period === 'monthly' ? '월별 추이' : 'YTD';
  const purposeStr = period === 'weekly'
    ? '이 분석의 목적은 **당주에 즉시 실행 가능한 단기 액션**을 도출하는 것입니다.'
    : '이 분석의 목적은 **반복되는 구조적 문제를 식별하고 중장기 개선 전략**을 수립하는 것입니다.';
  return `당신은 SOCAR 카셰어링 경기강원 사업팀 실적 분석 전문가입니다.\n${purposeStr}\n\n[분석 기간] ${periodStr}\n\n[W-1]\n${fmtRow(W1)}\n\n[W-2]\n${fmtRow(W2)}\n\n[전년 동기]\n${fmtRow(Y1)}\n\n---\n${period==='weekly' ? `### 1. 핵심 시그널 (2~3가지)\n### 2. 즉시 실행 액션 (3가지)\n### 3. 다음 주 주목 지표` : `### 1. 장기 트렌드 (2~3가지)\n### 2. 구조적 문제 원인\n### 3. 중장기 개선 과제 (2~3가지)`}`;
}

function buildTrendPrompt() {
  const ds = getDatasets();
  const rows = ds.now.map((w, i) => {
    const yoy = ds.yoy[i];
    return `${ds.labels[i]}: 대당매출 ${fmt(w?.rev_per_car,'krw')}원, GPM ${fmt(w?.gpm,'pct')}, 이용건수 ${fmt(w?.use_count,'cnt')}건, YoY대당매출 ${fmt(yoy?.rev_per_car,'krw')}원`;
  }).join('\n');
  return `당신은 SOCAR 카셰어링 경기강원 사업팀 분석 전문가입니다.\n아래 ${period} 데이터의 트렌드를 분석해주세요.\n\n[데이터]\n${rows}\n\n### 1. 주요 트렌드 (2~3가지)\n### 2. YoY 변화 원인 추론\n### 3. 개선 방향`;
}

function buildFreePrompt(userText) {
  return userText;  // 시스템 프롬프트는 messages 배열에서 처리
}

loadAiConfig();
load();
// 헤더 높이 변경(창 크기 조절, 지역 펼침 등) 시 패널 위치 재계산
new ResizeObserver(adjustRankPanelTop).observe(document.querySelector('.ctrl') || document.body);
