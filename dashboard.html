<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경기강원 실적 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
       background: #f0f2f5; color: #111827; font-size: 13px; overflow-x: hidden; }

/* ─── Header ─── */
.hdr { background:#0064FF; color:#fff; height:52px; display:flex; align-items:center;
       gap:12px; padding:0 20px; position:sticky; top:0; z-index:300;
       box-shadow:0 2px 8px rgba(0,100,255,.3); }
.hdr-title { font-size:15px; font-weight:800; white-space:nowrap; }
.hdr-sub   { font-size:11px; opacity:.7; }
.hdr-sep   { flex:1; }
.hdr-updated { font-size:11px; opacity:.65; white-space:nowrap; }
.btn-chat-toggle { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3); color:#fff; border-radius:8px; padding:5px 12px;
  font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; transition:.15s; }
.btn-chat-toggle:hover { background:rgba(255,255,255,.25); }
.btn-chat-toggle.chat-open { background:rgba(255,255,255,.3); }

/* ─── Controls strip ─── */
.ctrl { background:#fff; border-bottom:1px solid #e5e7eb; padding:6px 16px;
        display:flex; align-items:center; gap:8px; min-height:44px; position:sticky;
        top:52px; z-index:200; flex-wrap:nowrap; overflow-x:auto; }
.tab-group { display:flex; background:#f0f2f5; border-radius:8px; padding:3px; gap:2px; flex-shrink:0; }
.tab { background:none; border:none; color:#6b7280; font-size:12px; font-weight:600;
       padding:4px 12px; border-radius:6px; cursor:pointer; white-space:nowrap; transition:.12s; }
.tab.active { background:#fff; color:#0064FF; box-shadow:0 1px 3px rgba(0,0,0,.12); }
.tab:not(.active):hover { color:#374151; }
.ctrl-sep { flex:1; }

/* Region picker */
.region-picker { display:flex; gap:6px; align-items:flex-start; flex-shrink:0; }
.region-box { border:1px solid #d1d5db; border-radius:8px; background:#fff;
              overflow:hidden; display:flex; flex-direction:column; }
.region-box-label { font-size:9px; font-weight:700; color:#9ca3af; letter-spacing:.5px;
                    padding:4px 10px 3px; border-bottom:1px solid #f3f4f6;
                    text-transform:uppercase; background:#f8fafc; }
.region-box-inner { display:flex; flex-wrap:wrap; gap:2px; padding:4px 6px; }
.region-box.r1 .region-box-inner { flex-direction:column; min-width:72px; }
.region-box.r2 .region-box-inner {
  display:grid; grid-template-columns:repeat(3,1fr);
  max-height:130px; overflow-y:auto; width:300px; }
.rbtn { border:none; background:none; border-radius:5px; padding:3px 8px;
        font-size:11px; font-weight:600; color:#4b5563; cursor:pointer;
        white-space:nowrap; transition:.1s; text-align:left; }
.rbtn:hover { background:#f0f4ff; color:#0064FF; }
.rbtn.active { background:#0064FF; color:#fff; }

.btn-update { background:#0064FF; color:#fff; border:none; border-radius:7px;
              padding:5px 12px; font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0; }
.btn-update:hover:not(:disabled) { background:#0052d4; }
.btn-update:disabled { opacity:.5; cursor:not-allowed; }

/* ─── Metric tabs ─── */
.mtabs { background:#fff; border-bottom:1px solid #e5e7eb; padding:0 16px 0 306px;
         display:flex; gap:0; position:sticky; top:96px; z-index:100; overflow-x:auto; }
.mtab { border:none; background:none; color:#6b7280; font-size:12px; font-weight:600;
        padding:9px 14px; cursor:pointer; border-bottom:2px solid transparent;
        white-space:nowrap; transition:.12s; }
.mtab.active { color:#0064FF; border-bottom-color:#0064FF; }
.mtab:hover:not(.active) { color:#374151; }

/* ─── Outer layout ─── */
.outer { display:flex; align-items:flex-start; gap:0; padding:0; min-height:calc(100vh - 136px); }

/* ─── Revenue Ranking Panel (left fixed) ─── */
.rank-panel {
  position:fixed; left:0; top:96px; /* JS가 실제값으로 덮어씀 */
  width:290px; height:calc(100vh - 96px);
  background:#fff; border-right:1px solid #e5e7eb;
  z-index:150; display:flex; flex-direction:column;
  box-shadow:2px 0 8px rgba(0,0,0,.06);
}
.rank-panel-hdr {
  padding:9px 12px 7px; border-bottom:1px solid #f3f4f6;
  font-size:12px; font-weight:800; color:#374151; letter-spacing:.2px;
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.rank-panel-week { font-size:10px; font-weight:600; color:#9ca3af; }
.rank-panel-body { overflow-y:auto; flex:1; scrollbar-width:thin; scrollbar-color:#e5e7eb transparent; }
.rank-panel-body::-webkit-scrollbar { width:5px; }
.rank-panel-body::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }
.rank-tbl { width:100%; border-collapse:collapse; }
.rank-tbl thead th {
  position:sticky; top:0; background:#f8fafc;
  font-size:10px; font-weight:700; color:#9ca3af; letter-spacing:.3px;
  padding:5px 4px; text-align:center; border-bottom:1px solid #efefef;
}
.rank-tbl thead th:first-child { text-align:left; padding-left:10px; }
.rank-tbl thead th:nth-child(2) { text-align:right; padding-right:8px; }
.rank-tbl tbody tr { border-bottom:1px solid #f5f5f5; cursor:pointer; transition:.1s; }
.rank-tbl tbody tr:hover { background:#f0f4ff; }
.rank-tbl tbody tr.rank-active { background:#eff6ff; }
.rank-tbl td { padding:6px 4px; text-align:center; color:#374151; white-space:nowrap; }
.rank-tbl td:first-child { text-align:left; padding-left:10px; }
.rank-tbl td:nth-child(2) { text-align:right; padding-right:8px; }
.rank-num { color:#c0c8d4; font-size:10px; font-weight:700; margin-right:4px; min-width:18px; display:inline-block; text-align:right; }
.rank-name { font-weight:600; font-size:11px; color:#111827; }
.rank-rev { font-weight:700; font-size:11px; color:#0064FF; white-space:nowrap; }
.rank-chg { font-size:10px; font-weight:700; white-space:nowrap; }
.rank-chg.up { color:#16a34a; }
.rank-chg.dn { color:#dc2626; }
.rank-chg.flat { color:#9ca3af; }

/* main에 왼쪽 여백 추가 */
.main { flex:1; padding:14px 16px 14px 306px; min-width:0; overflow-x:clip; }

/* ─── Chat sidebar ─── */
.chat-sidebar {
  width:340px; flex-shrink:0;
  background:#fff; border-left:1px solid #e5e7eb;
  position:fixed; top:52px; right:0;
  height:calc(100vh - 52px);
  display:flex; flex-direction:column;
  z-index:200;
  transition:width .2s, opacity .2s;
  box-shadow:-2px 0 12px rgba(0,0,0,.08);
}
.chat-sidebar.chat-hidden {
  width:0; overflow:hidden; opacity:0; pointer-events:none; border:none;
}
/* 사이드바 열릴 때 main 우측 여백 확보 */
.outer:not(.sidebar-closed) > .main { padding-right:340px; }
.chat-hdr { background:#0064FF; color:#fff; padding:12px 14px;
            display:flex; align-items:center; gap:10px; flex-shrink:0; }
.chat-hdr-avatar { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.15);
                   display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.chat-hdr-title { font-size:14px; font-weight:800; letter-spacing:-.2px; flex:1; }
.chat-model-badge { font-size:9px; background:rgba(255,255,255,.2); padding:2px 7px;
                    border-radius:8px; letter-spacing:.3px; }
.chat-status { font-size:10px; opacity:.7; }
.chat-messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px; }
.chat-msg { display:flex; flex-direction:column; gap:3px; max-width:90%; }
.chat-msg.ai { align-self:flex-start; }
.chat-msg.user { align-self:flex-end; }
.chat-bubble { padding:9px 12px; border-radius:10px; font-size:12px; line-height:1.6; white-space:pre-wrap; }
.chat-msg.ai .chat-bubble { background:#f0f4ff; border:1px solid #dce5ff; color:#1e293b; border-radius:2px 10px 10px 10px; }
.chat-msg.user .chat-bubble { background:#0064FF; color:#fff; border-radius:10px 2px 10px 10px; }
.chat-meta { font-size:10px; color:#9ca3af; }
.chat-msg.user .chat-meta { text-align:right; }
.chat-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
              color:#9ca3af; font-size:12px; text-align:center; gap:8px; }
.chat-empty-icon { font-size:28px; }

/* Quick action buttons */
.chat-actions { padding:8px 12px; border-top:1px solid #f3f4f6; display:flex; gap:6px; flex-wrap:wrap; flex-shrink:0; }
.chat-action-btn { background:#f0f4ff; border:1px solid #c7d4ff; border-radius:6px;
                   color:#3b5bdb; font-size:11px; font-weight:600; padding:5px 10px;
                   cursor:pointer; flex:1; min-width:0; }
.chat-action-btn:hover { background:#dce5ff; }
.chat-action-btn:disabled { opacity:.4; cursor:not-allowed; }

/* Chat input area */
.chat-input-area { padding:10px 12px; border-top:1px solid #e5e7eb; display:flex; gap:6px; flex-shrink:0; }
.chat-input { flex:1; border:1px solid #d1d5db; border-radius:8px; padding:7px 10px;
              font-size:12px; outline:none; resize:none; font-family:inherit;
              min-height:36px; max-height:80px; }
.chat-input:focus { border-color:#0064FF; }
.chat-send { background:#0064FF; color:#fff; border:none; border-radius:8px;
             padding:7px 12px; font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0; }
.chat-send:disabled { opacity:.4; cursor:not-allowed; }
.chat-no-key { padding:12px; background:#fef3c7; border-top:1px solid #fde68a;
               font-size:11px; color:#92400e; text-align:center; flex-shrink:0; }

/* ─── KPI row ─── */
.kpi-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.kpi { background:#fff; border-radius:10px; padding:11px 14px; min-width:140px;
       box-shadow:0 1px 3px rgba(0,0,0,.07); border-left:3px solid var(--ac,#0064FF);
       flex:1; }
.kpi-lbl { font-size:10px; color:#6b7280; font-weight:600; letter-spacing:.3px; margin-bottom:3px; }
.kpi-val { font-size:18px; font-weight:800; line-height:1; }
.kpi-unit { font-size:10px; color:#9ca3af; margin-left:2px; }
.badge-row { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
.badge { display:inline-flex; align-items:center; gap:2px; font-size:10px; font-weight:700;
         padding:2px 6px; border-radius:8px; }
.badge.up   { background:#dcfce7; color:#166534; }
.badge.dn   { background:#fee2e2; color:#991b1b; }
.badge.flat { background:#f3f4f6; color:#6b7280; }
.badge .bl  { font-size:8px; opacity:.7; }

/* ─── Metric section ─── */
.metric-section { display:flex; flex-direction:column; gap:12px; }

/* ─── Chart+Table card ─── */
.chart-card { background:#fff; border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.07);
              overflow:hidden; }
.chart-hdr { font-size:11px; font-weight:700; color:#374151; padding:12px 14px 8px;
             display:flex; align-items:center; gap:6px; border-bottom:1px solid #f3f4f6; }
.chart-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.chart-wrap { position:relative; height:200px; padding:4px 8px 4px; }
.chart-wrap canvas { max-height:192px; }

/* ─── Data table ─── */
.data-table-wrap { overflow-x:auto; border-top:1px solid #f3f4f6; }
.data-table { width:100%; border-collapse:collapse; font-size:11px; }
.data-table th { background:#f8fafc; color:#6b7280; font-weight:600;
                 padding:6px 10px; text-align:right; border-bottom:1px solid #e5e7eb;
                 white-space:nowrap; }
.data-table th:first-child { text-align:left; }
.data-table td { padding:5px 10px; text-align:right; border-bottom:1px solid #f3f4f6;
                 color:#374151; white-space:nowrap; }
.data-table td:first-child { text-align:left; font-weight:600; color:#111827; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:#f8fafc; }
.td-up   { color:#166534 !important; }
.td-dn   { color:#991b1b !important; }
.td-flat { color:#6b7280 !important; }

/* Chart grid */
.chart-grid { display:grid; gap:12px; }
.chart-grid.cols2 { grid-template-columns:1fr 1fr; }
.chart-grid.cols1 { grid-template-columns:1fr; }
@media(max-width:900px) { .chart-grid.cols2 { grid-template-columns:1fr; } }

/* ─── Region breakdown ─── */
/* ─── Jump Tables ─── */
.jump-section { margin-top:20px; padding-top:14px; border-top:2px solid #e5e7eb; }
.jump-section-hdr { font-size:13px; font-weight:800; color:#374151; margin-bottom:8px;
                    letter-spacing:-.01em; }
.jump-tables-wrap { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; align-items:start; }
.jump-card { background:#fff; border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.07); overflow:hidden; }
.jump-card-hdr { font-size:12px; font-weight:800; color:#111827; padding:7px 10px 6px;
                 border-bottom:1px solid #f0f0f0; }
.jump-card-body { display:flex; flex-direction:column; gap:0; }
.jump-group { border-bottom:1px solid #f5f5f5; }
.jump-group:last-child { border-bottom:none; }
.jump-group-lbl { font-size:10px; font-weight:800; color:#6b7280; letter-spacing:.4px;
                  padding:4px 10px 3px; background:#f8fafc; border-bottom:1px solid #f0f0f0; }
.jump-tbl { width:100%; border-collapse:collapse; font-size:11px; }
.jump-period-hdr { font-size:10px; font-weight:700; color:#6b7280; padding:4px 8px 3px;
                   text-align:left; background:#f8fafc; border-bottom:1px solid #efefef; }
.jump-tbl thead tr:last-child th { font-size:9px; font-weight:700; color:#c0c8d4;
                   padding:2px 6px; text-align:right; border-bottom:1px solid #f0f0f0; }
.jump-tbl thead tr:last-child th:first-child,
.jump-tbl thead tr:last-child th:nth-child(4) { text-align:left; }
.jump-tbl tbody tr { border-bottom:1px solid #fafafa; }
.jump-tbl tbody tr:last-child { border-bottom:none; }
.jump-tbl td, .jump-tbl th { vertical-align:middle; }
.jump-name { padding:3px 6px; color:#111827; font-weight:600; white-space:nowrap;
             overflow:hidden; text-overflow:ellipsis; max-width:110px; }
.jump-cars { padding:3px 4px; text-align:right; color:#9ca3af; font-size:10px; white-space:nowrap; }
.jump-chg  { padding:3px 6px; text-align:right; font-weight:700; white-space:nowrap; }
.jump-val  { padding:3px 6px; text-align:right; color:#6b7280; white-space:nowrap; }
.jump-up   { color:#16a34a; }
.jump-dn   { color:#dc2626; }
.jump-empty { color:#9ca3af; font-size:11px; padding:6px 10px; }
.jc-sep    { border-left:1px solid #e5e7eb !important; }
.jc-dim    { color:#d1d5db; }

.region-breakdown { background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.08);
                    margin-top:14px; overflow:hidden; }
.region-breakdown-hdr { font-size:13px; font-weight:700; color:#111827; padding:14px 16px 12px;
                         display:flex; align-items:center; gap:7px; border-bottom:1px solid #f0f2f5;
                         letter-spacing:-.01em; }
.region-breakdown-hdr .hdr-sub { font-size:11px; font-weight:500; color:#9ca3af; margin-left:4px; }
.region-table-wrap { overflow-x:auto; }
.region-table { width:100%; border-collapse:collapse; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
.region-table th { background:#f8fafc; color:#6b7280; font-weight:500; padding:7px 10px;
                   text-align:right; white-space:nowrap; font-size:11px; letter-spacing:-.01em; }
.region-table th:first-child { text-align:left; position:sticky; left:0; background:#f8fafc; z-index:1; }
/* 그룹 레이블 행 */
.region-table th.grp { background:#eef2ff; color:#3b5bdb; border-top:2px solid #c5d3ff; border-bottom:2px solid #c5d3ff;
                        text-align:center; border-left:2px solid #c5d3ff; vertical-align:middle;
                        padding:8px 10px 7px; font-size:11.5px; font-weight:700; letter-spacing:-.01em; }
/* 지역 헤더 셀 (row1의 빈칸) */
.region-table th.th-region-top { background:#eef2ff; border-top:2px solid #c5d3ff; border-bottom:2px solid #c5d3ff;
                                   border-right:2px solid #c5d3ff; }
/* 서브 헤더 행 */
.region-table th.th-region-lbl { text-align:left; position:sticky; left:0; background:#f4f6fa; z-index:1;
                                   font-size:11px; font-weight:600; color:#374151;
                                   border-top:2px solid #c5d3ff; border-bottom:2px solid #d1d5db;
                                   border-right:2px solid #c5d3ff;
                                   min-width:72px; padding:6px 10px; }
.region-table th.sub-v { color:#111827; font-weight:700; font-size:11.5px; min-width:76px;
                           border-top:2px solid #c5d3ff; border-bottom:2px solid #d1d5db;
                           border-right:1px solid #dbe4ff; }
.region-table th.grp-sep { border-left:2px solid #c5d3ff; }
.region-table th.sub-c { color:#9ca3af; font-weight:500; font-size:10px; min-width:44px;
                           border-top:2px solid #c5d3ff; border-bottom:2px solid #d1d5db; }
.region-table th.sub-c-mid { border-right:1px solid #e5e7eb; }
.region-table th.sub-c.sort-active { color:#3b5bdb; font-weight:700; }
.region-table th.sub-c.sort-th { cursor:pointer; user-select:none; }
.region-table th.sub-c.sort-th:hover { color:#3b5bdb; background:#f0f4ff; }
/* 데이터 행 */
.region-table td { padding:7px 10px; text-align:right; border-bottom:1px solid #f0f2f5; white-space:nowrap; font-size:11.5px; color:#374151; }
.region-table td.grp-sep { border-left:2px solid #c5d3ff; }
.region-table td.td-val { font-weight:600; color:#111827; font-size:12px; border-right:1px solid #edf0ff; }
.region-table td.td-chg { font-size:10.5px; color:#9ca3af; min-width:44px; }
.region-table td.td-chg-mid { border-right:1px solid #f0f2f5; }
.region-table td:first-child { text-align:left; font-weight:500; color:#374151;
                                position:sticky; left:0; background:#fff; z-index:1; cursor:pointer;
                                min-width:72px; max-width:120px; font-size:11.5px; padding-left:14px;
                                border-right:2px solid #c5d3ff; }
.region-table td:first-child:hover { color:#0064FF; }
.region-table tr:last-child td { border-bottom:none; }
.region-table tr:nth-child(even) td { background:#f9fafb; }
.region-table tr:nth-child(even) td:first-child { background:#f9fafb; }
.region-table tr:hover td { background:#eef2ff !important; }
.region-table tr:hover td:first-child { background:#eef2ff !important; color:#0064FF; }

/* ─── Way Type 전용 ─── */
.wt-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.wt-col { background:#fff; border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.07);
          overflow:hidden; }
.wt-col-hdr { font-size:13px; font-weight:800; color:#111827; padding:12px 14px 10px;
              border-bottom:1px solid #f3f4f6; }
.wt-metric { display:flex; align-items:baseline; gap:6px; padding:7px 14px;
             border-bottom:1px solid #f9fafb; flex-wrap:wrap; }
.wt-lbl { font-size:11px; color:#6b7280; flex-shrink:0; width:80px; }
.wt-val { font-size:13px; font-weight:700; color:#111827; }
.wt-chg { font-size:10px; display:flex; gap:4px; flex-wrap:wrap; }
.ut-legend { display:flex; flex-direction:column; gap:8px; }
.ut-slice { display:grid; grid-template-columns:12px 52px 36px 52px auto; align-items:center; gap:6px; font-size:12px; }
.ut-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
.ut-label { color:#374151; font-weight:600; }
.ut-pct { font-weight:700; color:#111827; }
.ut-cnt { color:#6b7280; font-size:11px; }
.ut-rpu { color:#9ca3af; font-size:10px; }
.util-toggle { display:flex; gap:2px; background:#f0f2f5; border-radius:6px; padding:2px; }
.util-toggle-btn { border:none; background:none; font-size:11px; font-weight:600; color:#6b7280;
  padding:2px 9px; border-radius:4px; cursor:pointer; transition:.12s; }
.util-toggle-btn.active { background:#fff; color:#3b82f6; box-shadow:0 1px 2px rgba(0,0,0,.1); }

/* Way Type 토글 */
.wt-toggle-bar { display:flex; gap:8px; margin-bottom:16px; }
.wt-toggle-btn { border:2px solid transparent; border-radius:10px; padding:6px 22px;
  font-size:13px; font-weight:700; cursor:pointer; transition:.15s; background:none; }
.wt-toggle-btn:hover { opacity:.8; }

/* Way Type KPI 행 */

</head>

<script>
Chart.register(ChartDataLabels);

/* ═══════════════════════════════════════════
   State
═══════════════════════════════════════════ */
let D = null;
let period   = 'weekly';
let metric   = 'revenue';
let region   = '';        // '' = 전체, '경기도'/'강원도' = region1, city = region2
let regionLevel = 0;      // 0=전체, 1=region1, 2=region2
let _r2byRegion1 = null;  // {경기도:[...], 강원도:[...]}
let charts   = [];
let aiConfigured = false;
let aiModel  = 'Claude';
let chatHistory = [];    // [{role:'user'|'assistant', content}]
let chatBusy = false;
let _rtSortState = null;   // {key, chg:'wow'|'yoy', dir:'desc'|'asc'}
let _rtStoredArgs = null;  // {rows, title, onClickFn}
let _rtLastMetric = null;

/* ═══════════════════════════════════════════
   Metric definitions
═══════════════════════════════════════════ */
const METRICS = {
  revenue: {
    label: '매출/가동',
    kpis: [
      { key:'rev_per_car',  label:'주당 대당매출', fmt:'krw', unit:'원', ac:'#0064FF' },
      { key:'revenue',      label:'주간 총매출',   fmt:'krw', unit:'원', ac:'#6366f1' },
      { key:'gpm',          label:'GPM',           fmt:'pct', unit:'',   ac:'#10b981' },
      { key:'opr_weekday',  label:'주중 가동률',   fmt:'pct', unit:'',   ac:'#3b82f6' },
      { key:'opr_weekend',  label:'주말 가동률',   fmt:'pct', unit:'',   ac:'#14b8a6' },
      { key:'car_count',    label:'운영 대수',     fmt:'cnt', unit:'대', ac:'#64748b' },
      { key:'zone_count',   label:'운영 존',       fmt:'cnt', unit:'개', ac:'#94a3b8' },
    ],
    charts: [
      { keys:['rev_per_car'], label:'대당매출 (원)',      fmt:'num',    colors:['#0064FF'] },
      { keys:['use_count'],   label:'이용 건수 (건)',     fmt:'num',    colors:['#6366f1'] },
      { keys:['car_count'],   label:'운영 대수 (대)',     fmt:'num',    colors:['#64748b'] },
      { keys:['opr_weekday'], label:'가동/사전가동 (%)', fmt:'pct100', colors:['#3b82f6'], utilToggle:true },
    ],
  },
  waytype: {
    label: 'Way Type',
    custom: true,   // handled by renderWaytype()
    kpis: [
      { key:'round_count',  label:'왕복 건수',  fmt:'cnt', unit:'건', ac:'#0064FF' },
      { key:'oneway_count', label:'편도 건수',  fmt:'cnt', unit:'건', ac:'#8b5cf6' },
      { key:'d2d_count',    label:'부름 건수',  fmt:'cnt', unit:'건', ac:'#ec4899' },
    ],
    charts: [],
  },
  demand: {
    label: '수요',
    kpis: [
      { key:'attempt',         label:'수요 접속시도',  fmt:'cnt', unit:'건', ac:'#f59e0b' },
      { key:'fail_rate',       label:'수요 실패율',    fmt:'pct', unit:'',   ac:'#ef4444' },
      { key:'payment_attempt', label:'결제 시도 수요', fmt:'cnt', unit:'건', ac:'#8b5cf6' },
    ],
    charts: [
      { keys:['attempt'],         label:'수요 접속시도 (건)', fmt:'cnt',    colors:['#f59e0b'] },
      { keys:['fail_rate'],       label:'수요 실패율 (%)',    fmt:'pct100', colors:['#ef4444'] },
      { keys:['payment_attempt'], label:'결제 시도 수요 (건)',fmt:'cnt',    colors:['#8b5cf6'] },
    ],
  },
  cost: {
    label: '비용',
    kpis: [
      { key:'discount_rate', label:'할인율',   fmt:'pct', unit:'', ac:'#6366f1' },
      { key:'use_count',     label:'이용건수', fmt:'cnt', unit:'건', ac:'#64748b' },
    ],
    charts: [
      { keys:['discount_rate'], label:'할인율 (%)', fmt:'pct100', colors:['#6366f1'] },
    ],
  },
};

/* ═══════════════════════════════════════════
   Data helpers
═══════════════════════════════════════════ */
function isoToDate(year, week) {
  const jan4 = new Date(year, 0, 4);
  const dow = (jan4.getDay() + 6) % 7;
  return new Date(jan4 - dow * 864e5 + (week - 1) * 7 * 864e5);
}
function isoToMonthKey(year, week) {
  const d = isoToDate(year, week);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(key) {
  const [y,m] = key.split('-');
  return `${y.slice(2)}/${m}`;
}

function getWeeklyData() {
  if (!D) return [];
  const all = D.weekly || [];
  if (regionLevel === 0) return all;
  if (regionLevel === 1) {
    // region1 선택: weekly_region2에서 해당 region1의 데이터를 합산
    const r2data = (D.weekly_region2 || []).filter(r => r.region1 === region);
    return aggregateByWeek(r2data);
  }
  if (regionLevel === 2) {
    // region2 선택: weekly_region2에서 해당 region 데이터
    const r2data = (D.weekly_region2 || []).filter(r => r.region === region);
    return r2data.map(r => ({...r}));
  }
  if (regionLevel === 3) {
    // region3 선택: weekly_region3에서 해당 region 데이터
    const r3data = (D.weekly_region3 || []).filter(r => r.region === region);
    return r3data.map(r => ({...r}));
  }
  return all;
}

function aggregateByWeek(rows) {
  const map = {};
  for (const r of rows) {
    const k = `${r.isoyear}_${r.isoweek}_${r.period_type}`;
    if (!map[k]) {
      map[k] = {
        isoyear: r.isoyear, isoweek: r.isoweek, period_type: r.period_type,
        car_count:0, zone_count:0, revenue:0, profit:0, use_count:0,
        _gpm_rev:0, _gpm_pft:0, _rpc_car:0,
        round_count:0, _round_rev:0, _round_utime:0,
        oneway_count:0, _oneway_rev:0, _oneway_utime:0,
        d2d_count:0, _d2d_rev:0, _d2d_utime:0,
        attempt:0, _fail_cnt:0,
        _opr_wd_w:0, _opr_wd_n:0, _opr_we_w:0, _opr_we_n:0,
        u_0to4h:0, u_4to8h:0, u_8to24h:0, u_24plus:0,
        u_0to4h_rev:0, u_4to8h_rev:0, u_8to24h_rev:0, u_24plus_rev:0,
        payment_attempt:0,
        _dc_w:0, _dc_n:0,
      };
    }
    const m = map[k];
    const cc = r.car_count || 0;
    m.car_count  += cc;
    m.zone_count += r.zone_count || 0;
    m.revenue    += r.revenue    || 0;
    m.profit     += r.profit     || 0;
    m.use_count  += r.use_count  || 0;
    m._gpm_rev   += r.revenue    || 0;
    m._gpm_pft   += r.profit     || 0;
    m._rpc_car   += cc;
    // 왕복/편도/부름 — 건수 가중 합산
    const rc = r.round_count  || 0, oc = r.oneway_count || 0, dc = r.d2d_count || 0;
    m.round_count  += rc;
    m._round_rev   += rc * (r.round_rev_per_use  || 0);
    m._round_utime += rc * (r.round_avg_hours    || 0);
    m.oneway_count  += oc;
    m._oneway_rev   += oc * (r.oneway_rev_per_use || 0);
    m._oneway_utime += oc * (r.oneway_avg_hours   || 0);
    m.d2d_count  += dc;
    m._d2d_rev   += dc * (r.d2d_rev_per_use || 0);
    m._d2d_utime += dc * (r.d2d_avg_hours   || 0);
    // 수요
    const att = r.attempt || 0;
    m.attempt          += att;
    m._fail_cnt        += att * (r.fail_rate || 0);
    m.payment_attempt  += r.payment_attempt || 0;
    // utime 구간별 건수·매출
    m.u_0to4h     += r.u_0to4h     || 0;
    m.u_4to8h     += r.u_4to8h     || 0;
    m.u_8to24h    += r.u_8to24h    || 0;
    m.u_24plus    += r.u_24plus    || 0;
    m.u_0to4h_rev += r.u_0to4h_rev || 0;
    m.u_4to8h_rev += r.u_4to8h_rev || 0;
    m.u_8to24h_rev+= r.u_8to24h_rev|| 0;
    m.u_24plus_rev+= r.u_24plus_rev|| 0;
    // 가동률 — car_count 가중 평균
    m._opr_wd_w += (r.opr_weekday || 0) * cc;  m._opr_wd_n += cc;
    m._opr_we_w += (r.opr_weekend || 0) * cc;  m._opr_we_n += cc;
    // 할인율 — use_count 가중 평균
    const uc = r.use_count || 0;
    m._dc_w += (r.discount_rate || 0) * uc;
    m._dc_n += uc;
  }
  return Object.values(map).map(m => ({
    ...m,
    gpm:            m._gpm_rev    ? m._gpm_pft  / m._gpm_rev    : 0,
    rev_per_car:    m._rpc_car    ? m.revenue   / m._rpc_car     : 0,
    opr_weekday:    m._opr_wd_n   ? m._opr_wd_w / m._opr_wd_n   : 0,
    opr_weekend:    m._opr_we_n   ? m._opr_we_w / m._opr_we_n   : 0,
    fail_rate:      m.attempt     ? m._fail_cnt / m.attempt      : 0,
    round_rev_per_use:  m.round_count  ? m._round_rev  / m.round_count  : 0,
    round_avg_hours:    m.round_count  ? m._round_utime / m.round_count : 0,
    oneway_rev_per_use: m.oneway_count ? m._oneway_rev  / m.oneway_count : 0,
    oneway_avg_hours:   m.oneway_count ? m._oneway_utime / m.oneway_count : 0,
    d2d_rev_per_use:    m.d2d_count    ? m._d2d_rev    / m.d2d_count    : 0,
    d2d_avg_hours:      m.d2d_count    ? m._d2d_utime  / m.d2d_count    : 0,
    discount_rate: m._dc_n ? m._dc_w / m._dc_n : 0,
  })).sort((a,b) => a.isoyear - b.isoyear || a.isoweek - b.isoweek);
}

function nowWeeks()  { return getWeeklyData().filter(w=>w.period_type==='now').sort((a,b)=>a.isoyear-b.isoyear||a.isoweek-b.isoweek); }
function yoyWeeks()  { return getWeeklyData().filter(w=>w.period_type==='yoy').sort((a,b)=>a.isoyear-b.isoyear||a.isoweek-b.isoweek); }

function getDatasets() {
  const now = nowWeeks(), yoy = yoyWeeks();
  if (period === 'weekly') {
    const last4 = now.slice(-4);
    const yoy4  = last4.map(w => yoy.find(y=>y.isoweek===w.isoweek)||null);
    return { labels: last4.map(w=>`W${w.isoweek}`), now: last4, yoy: yoy4, labelNow:'2026', labelYoy:'2025' };
  }
  if (period === 'monthly') {
    const agg = (weeks) => {
      const m = {};
      for (const w of weeks) {
        const k = isoToMonthKey(w.isoyear, w.isoweek);
        if (!m[k]) m[k] = {_k:k, _n:0};
        addWeekToMonth(m[k], w);
      }
      return Object.values(m).sort((a,b)=>a._k.localeCompare(b._k)).map(finalizeMonth);
    };
    const mNow = agg(now), mYoy = agg(yoy);
    const labels = mNow.map(m=>monthLabel(m._k));
    const yoyMap = Object.fromEntries(mYoy.map(m=>[m._k.slice(5), m]));
    const yoyAligned = mNow.map(m=>yoyMap[m._k.slice(5)]||null);
    return { labels, now:mNow, yoy:yoyAligned, labelNow:'2026', labelYoy:'2025' };
  }
  // YTD — 실적(W1~W-1) + 미래 참고(W~W+4, YoY만)
  const yoyMap = Object.fromEntries(yoy.map(w=>[w.isoweek, w]));
  const yoyAligned = now.map(w => yoyMap[w.isoweek] || null);

  // 마지막 실적 주차 다음부터 +4주까지 YoY 참고 구간 추가
  const lastWeek = now.at(-1)?.isoweek ?? 0;
  const futureWeeks = [1, 2, 3, 4, 5].map(i => lastWeek + i)
    .filter(w => yoyMap[w]);                       // 캐시에 있는 주차만
  const futureNulls = futureWeeks.map(() => null);  // 2026 실적 없음
  const futureYoy   = futureWeeks.map(w => yoyMap[w]);

  const extLabels = [
    ...now.map(w => `W${w.isoweek}`),
    ...futureWeeks.map(w => `W${w} *`),             // * = YoY 참고
  ];
  const extNow = [...now, ...futureNulls];
  const extYoy = [...yoyAligned, ...futureYoy];

  return { labels: extLabels, now: extNow, yoy: extYoy,
           labelNow:'2026', labelYoy:'2025', futureFrom: now.length };
}

const SUM_KEYS = ['revenue','profit','use_count','attempt',
  'round_count','oneway_count','d2d_count',
  'u_0to4h','u_4to8h','u_8to24h','u_24plus',
  'u_0to4h_rev','u_4to8h_rev','u_8to24h_rev','u_24plus_rev',
  'payment_attempt'];
const AVG_KEYS = ['rev_per_car','gpm','opr_weekday','opr_weekend','fail_rate',
  'discount_rate','round_rev_per_use','round_avg_hours',
  'oneway_rev_per_use','oneway_avg_hours','d2d_rev_per_use','d2d_avg_hours','car_count','zone_count'];

function addWeekToMonth(m, w) {
  m._n++;
  for (const k of SUM_KEYS) m[k] = (m[k]||0) + (w[k]||0);
  for (const k of AVG_KEYS)  m[k] = (m[k]||0) + (w[k]||0);
}
function finalizeMonth(m) {
  const n = m._n || 1;
  for (const k of AVG_KEYS) m[k] = m[k] / n;
  m.gpm = m.revenue ? m.profit / m.revenue : 0;
  m.rev_per_car = m.car_count && m._n ? m.revenue / m.car_count : 0;
  return m;
}

/* ═══════════════════════════════════════════
   Format helpers
═══════════════════════════════════════════ */
function fmt(v, f) {
  if (v == null || isNaN(v)) return '-';
  switch (f) {
    case 'krw':    return Math.round(v).toLocaleString('ko-KR');
    case 'pct':    return (v*100).toFixed(1) + '%';
    case 'pct100': return (v*100).toFixed(1) + '%';
    case 'cnt':    return Math.round(v).toLocaleString('ko-KR');
    case 'num':    return Math.round(v).toLocaleString('ko-KR');
    case 'hr':     return v.toFixed(1);
    default:       return String(v);
  }
}
function fmtAxis(v, f) {
  if (v == null || isNaN(v)) return '';
  switch (f) {
    case 'krw':
      if (Math.abs(v) >= 1e8) return (v/1e8).toFixed(1) + '억';
      if (Math.abs(v) >= 1e6) return (v/1e6).toFixed(1) + 'M';
      if (Math.abs(v) >= 1e3) return (v/1e3).toFixed(0) + 'K';
      return v.toFixed(0);
    case 'pct100': return v.toFixed(1) + '%';
    case 'cnt':
      if (Math.abs(v) >= 1e4) return (v/1e3).toFixed(0) + 'K';
      return v.toFixed(0);
    case 'num':    return Math.round(v).toLocaleString('ko-KR');
    case 'hr': return v.toFixed(1) + 'h';
    default:   return String(v);
  }
}
function pctChg(cur, prev) {
  if (!prev || !cur) return null;
  return (cur - prev) / Math.abs(prev) * 100;
}
function periodChgLabel() {
  return period === 'monthly' ? 'MoM ' : 'WoW ';
}
function badgeHtml(chg, prefix) {
  if (chg == null) return '';
  const dir = chg > 0.5 ? 'up' : chg < -0.5 ? 'dn' : 'flat';
  const sign = chg > 0 ? '+' : '';
  return `<span class="badge ${dir}"><span class="bl">${prefix}</span>${sign}${chg.toFixed(1)}%</span>`;
}
function tdChg(chg) {
  if (chg == null) return '<td class="td-flat">-</td>';
  const cls = chg > 0.5 ? 'td-up' : chg < -0.5 ? 'td-dn' : 'td-flat';
  const sign = chg > 0 ? '+' : '';
  return `<td class="${cls}">${sign}${chg.toFixed(1)}%</td>`;
}

/* ═══════════════════════════════════════════
   Render
═══════════════════════════════════════════ */
function adjustRankPanelTop() {
  const hdr   = document.querySelector('.hdr');
  const ctrl  = document.querySelector('.ctrl');
  const panel = document.getElementById('rankPanel');
  if (!panel) return;
  const top = (hdr?.offsetHeight || 52) + (ctrl?.offsetHeight || 44);
  panel.style.top    = top + 'px';
  panel.style.height = `calc(100vh - ${top}px)`;
}

function renderRankPanel() {
  adjustRankPanelTop();
  if (!D?.weekly_region2?.length) return;

  // 최신 주차 now 데이터
  const nowRows = D.weekly_region2.filter(r => r.period_type === 'now');
  const allWeeks = [...new Set(nowRows.map(r => r.isoyear * 100 + r.isoweek))].sort((a,b)=>a-b);
  if (!allWeeks.length) return;
  const latestKey = allWeeks.at(-1);
  const prevKey   = allWeeks.at(-2);
  const latestYear = Math.floor(latestKey / 100), latestWeek = latestKey % 100;

  const nowMap  = {}, prevMap = {}, yoyMap = {};
  for (const r of D.weekly_region2) {
    const k = r.isoyear * 100 + r.isoweek;
    const name = r.region || '';
    if (!name) continue;
    if (r.period_type === 'now' && k === latestKey) nowMap[name]  = r;
    if (r.period_type === 'now' && k === prevKey)   prevMap[name] = r;
    if (r.period_type === 'yoy' && r.isoweek === latestWeek && r.isoyear < latestYear) yoyMap[name] = r;
  }

  // 매출 내림차순 정렬
  const rows = Object.entries(nowMap)
    .sort((a,b) => (b[1].revenue||0) - (a[1].revenue||0));

  const fmtRev = v => {
    if (v == null) return '-';
    if (v >= 1e8) return (v/1e8).toFixed(1) + '억';
    if (v >= 1e4) return Math.round(v/1e4).toLocaleString() + '만';
    return Math.round(v).toLocaleString() + '원';
  };
  const fmtChg = (now, base) => {
    if (now == null || !base) return { txt:'-', cls:'flat' };
    const c = (now - base) / Math.abs(base) * 100;
    return { txt: (c>0?'+':'')+c.toFixed(1)+'%', cls: c>0?'up':c<0?'dn':'flat' };
  };

  document.getElementById('rankWeekLabel').textContent = `W${latestWeek}`;

  const tbody = document.getElementById('rankTbody');
  tbody.innerHTML = rows.map(([name, r], i) => {
    const wow = fmtChg(r.revenue, prevMap[name]?.revenue);
    const yoy = fmtChg(r.revenue, yoyMap[name]?.revenue);
    const isActive = (region === name) ? ' class="rank-active"' : '';
    // 지역명 22자 이상 시 줄임
    const cleanName = name.replace(/\u3000/g, ' ').replace(/\s+/g, ' ').trim();
    const displayName = cleanName.length > 10 ? cleanName.slice(0,10)+'…' : cleanName;
    return `<tr${isActive} onclick="selectRankRegion('${name.replace(/'/g,"\\'")}')">
      <td><span class="rank-num">${i+1}</span><span class="rank-name">${displayName}</span></td>
      <td class="rank-rev">${fmtRev(r.revenue)}</td>
      <td class="rank-chg ${wow.cls}">${wow.txt}</td>
      <td class="rank-chg ${yoy.cls}">${yoy.txt}</td>
    </tr>`;
  }).join('');
}

function selectRankRegion(name) {
  // region2 버튼이 있으면 클릭, 없으면 직접 setRegion2
  const btn = document.querySelector(`#r2Btns .rbtn[data-val="${name}"]`);
  if (btn) { btn.click(); return; }
  // 해당 지역의 region1 찾기
  const row = D?.weekly_region2?.find(r => r.region === name && r.period_type === 'now');
  if (row) {
    const r1 = row.region1?.includes('강원') ? '강원도' : '경기도';
    setR1(r1);
    setTimeout(() => {
      const b2 = document.querySelector(`#r2Btns .rbtn[data-val="${name}"]`);
      if (b2) b2.click();
    }, 50);
  }
}

        <button class="util-toggle-btn" id="utilBtn_we_${i}" onclick="switchUtil(${i},'weekend',this)">주말</button>

/* ─── Jump Tables (대당매출 / 이용건수 점프 지역) ─── */
function buildJumpTables() {
  if (metric !== 'revenue') return '';
  const numFmt = v => Math.round(v).toLocaleString('ko-KR');

  // region2 선택 시 → region3 데이터 사용
  if (regionLevel === 2) {
    return buildJumpTablesFromR3(numFmt);
  }
  // 전체 / region1 선택 → region2 데이터 사용
  return buildJumpTablesFromR2(numFmt);
}

function _buildJumpMaps(rows) {
  const nowRows = rows.filter(r => r.period_type === 'now');
  const allKeys = [...new Set(nowRows.map(r => r.isoyear * 100 + r.isoweek))].sort((a,b)=>a-b);
  if (allKeys.length < 2) return null;
  const latestKey = allKeys.at(-1);
  const prevKey   = allKeys.at(-2);
  const latestYear = Math.floor(latestKey/100), latestWeek = latestKey % 100;
  const nowMap = {}, prevMap = {}, yoyMap = {};
  for (const r of rows) {
    const k = r.isoyear * 100 + r.isoweek;
    const name = r.region; if (!name) continue;
    if (r.period_type === 'now' && k === latestKey) nowMap[name] = r;
    if (r.period_type === 'now' && k === prevKey)   prevMap[name] = r;
    if (r.period_type === 'yoy' && r.isoweek === latestWeek && r.isoyear < latestYear) yoyMap[name] = r;
  }
  return { nowMap, prevMap, yoyMap };
}

function _top5(nowMap, baseMap, key, filterFn) {
  return Object.entries(nowMap)
    .filter(([, r]) => !filterFn || filterFn(r))
    .map(([name, r]) => {
      const base = baseMap[name]?.[key], cur = r[key];
      if (cur == null || base == null || base === 0) return null;
      return { name, chg: (cur - base) / Math.abs(base) * 100, val: cur, cars: r.car_count };
    })
    .filter(Boolean).sort((a,b) => b.chg - a.chg).slice(0, 5);
}
function _bottom5(nowMap, baseMap, key, filterFn) {
  return Object.entries(nowMap)
    .filter(([, r]) => !filterFn || filterFn(r))
    .map(([name, r]) => {
      const base = baseMap[name]?.[key], cur = r[key];
      if (cur == null || base == null || base === 0) return null;
      return { name, chg: (cur - base) / Math.abs(base) * 100, val: cur, cars: r.car_count };
    })
    .filter(Boolean).sort((a,b) => a.chg - b.chg).slice(0, 5);
}

function _mergedGroupHtml(upRows, dnRows, numFmt) {
  const maxLen = Math.max(upRows.length, dnRows.length, 1);
  const cell = (r, i, sep) => {
    const sepCls = sep ? ' jc-sep' : '';
    if (!r) return `<td class="jump-name${sepCls} jc-dim">—</td><td class="jump-cars jc-dim">—</td><td class="jump-chg">—</td><td class="jump-val">—</td>`;
    const nm = r.name.replace(/\u3000/g,' ').replace(/\s+/g,' ').trim();
    const chgCls = r.chg >= 0 ? 'jump-up' : 'jump-dn';
    return `<td class="jump-name${sepCls}">${i+1}. ${nm}</td>
            <td class="jump-cars${sepCls}">${r.cars != null ? fmt(r.cars,'cnt') : '—'}</td>
            <td class="jump-chg ${chgCls}">${r.chg>0?'+':''}${r.chg.toFixed(1)}%</td>
            <td class="jump-val">${numFmt(r.val)}</td>`;
  };
  return `<table class="jump-tbl">
    <colgroup>
      <col style="width:22%"><col style="width:8%"><col style="width:10%"><col style="width:10%">
      <col style="width:22%"><col style="width:8%"><col style="width:10%"><col style="width:10%">
    </colgroup>
    <thead>
      <tr>
        <th colspan="4" class="jump-period-hdr" style="color:#16a34a">▲ 점프 (상승)</th>
        <th colspan="4" class="jump-period-hdr jc-sep" style="color:#dc2626">▼ 하락</th>
      </tr>
      <tr>
        <th style="text-align:left">지역</th><th>대수</th><th>상승률</th><th>수치</th>
        <th class="jc-sep" style="text-align:left">지역</th><th>대수</th><th>하락률</th><th>수치</th>
      </tr>
    </thead>
    <tbody>${Array.from({length: maxLen}, (_,i) =>
      `<tr>${cell(upRows[i], i, false)}${cell(dnRows[i], i, true)}</tr>`
    ).join('')}</tbody>
  </table>`;
}

function buildJumpTablesFromR2(numFmt) {
  const r2data = D.weekly_region2 || [];
  if (!r2data.length) return '';
  const maps = _buildJumpMaps(r2data);
  if (!maps) return '';
  const { nowMap, prevMap, yoyMap } = maps;

  const matchR1 = (rowR1, target) =>
    target === '강원도' ? (rowR1||'').includes('강원') : (rowR1||'').includes('경기');

  // 전체일 때: 경기/강원 분리. region1 선택 시: 해당 도만 단일 그룹
  const groups = regionLevel === 0
    ? ['경기도', '강원도']
    : [region]; // '경기도' or '강원도'

  const cardHtml = (label, key) => `
    <div class="jump-card">
      <div class="jump-card-hdr">📈 ${label}</div>
      <div class="jump-card-body">
        ${groups.map(r1 => {
          const filter = regionLevel === 0 ? r => matchR1(r.region1, r1) : null;
          return `<div class="jump-group">
            ${groups.length > 1 ? `<div class="jump-group-lbl">${r1}</div>` : ''}
            <div style="padding:4px 0">
              ${_mergedGroupHtml(_top5(nowMap, prevMap, key, filter), _bottom5(nowMap, prevMap, key, filter), numFmt)}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

  return `<div class="jump-section">
    <div class="jump-section-hdr">⚡ 주간 점프 지역</div>
    <div class="jump-tables-wrap">
      ${cardHtml('대당 매출 점프 Top 5', 'rev_per_car')}
      ${cardHtml('이용 건수 점프 Top 5', 'use_count')}
    </div>
  </div>`;
}

function buildJumpTablesFromR3(numFmt) {
  const r3data = (D.weekly_region3 || []).filter(r => r.region2_parent === region);
  if (!r3data.length) return '';
  const maps = _buildJumpMaps(r3data);
  if (!maps) return '';
  const { nowMap, prevMap, yoyMap } = maps;

  const cardHtml = (label, key) => `
    <div class="jump-card">
      <div class="jump-card-hdr">📈 ${label} (${region} 읍면동)</div>
      <div class="jump-card-body">
        <div class="jump-group">
          <div style="padding:4px 0">
            ${_mergedGroupHtml(_top5(nowMap, prevMap, key, null), _bottom5(nowMap, prevMap, key, null), numFmt)}
          </div>
        </div>
      </div>
    </div>`;

  return `<div class="jump-section">
    <div class="jump-section-hdr">⚡ 주간 점프 읍면동 (${region})</div>
    <div class="jump-tables-wrap">
      ${cardHtml('대당 매출 점프 Top 5', 'rev_per_car')}
      ${cardHtml('이용 건수 점프 Top 5', 'use_count')}
    </div>
  </div>`;
}

/* ─── Table builder ─── */
function buildTable(cfg, ds, chartIdx) {
  const key0 = cfg.keys[0];
  const key1 = cfg.keys[1];
  const nowData = ds.now, yoyData = ds.yoy;

  let thead = `<tr>
    <th>기간</th>
    <th>2026</th>
    ${key1 ? `<th>2026 (${keyLabel(key1)})</th>` : ''}
    <th>2025 (YoY)</th>
    ${key1 ? `<th>2025 (${keyLabel(key1)})</th>` : ''}
    <th>${period==='monthly'?'MoM':'WoW'}</th>
    <th>YoY</th>
  </tr>`;

  let tbody = '';
  for (let i = 0; i < nowData.length; i++) {
    const cur  = nowData[i];
    const prev = nowData[i-1] || null;
    const yoy  = yoyData[i];
    const v0   = cur  ? cur[key0]  : null;
    const v0p  = prev ? prev[key0] : null;
    const v0y  = yoy  ? yoy[key0]  : null;
    const v1   = key1 && cur ? cur[key1] : null;
    const v1y  = key1 && yoy ? yoy[key1] : null;
    const wow  = pctChg(v0, v0p);
    const yoyc = pctChg(v0, v0y);
    const lbl  = ds.labels[i] || `#${i+1}`;
    tbody += `<tr>
      <td>${lbl}</td>
      <td>${fmt(v0, cfg.fmt)}</td>
      ${key1 ? `<td>${fmt(v1, cfg.fmt2||cfg.fmt)}</td>` : ''}
      <td>${fmt(v0y, cfg.fmt)}</td>
      ${key1 ? `<td>${fmt(v1y, cfg.fmt2||cfg.fmt)}</td>` : ''}
      ${tdChg(wow)}
      ${tdChg(yoyc)}
    </tr>`;
  }

  // 사전가동률 행 추가 (utilToggle 차트에만)
  if (cfg.utilToggle && period === 'weekly' && D?.advance_util?.meta) {
    const au = D.advance_util;
    const meta = au.meta || {};
    const dayKey = key0 === 'opr_weekday' ? 'weekday' : 'weekend';
    const fmtAdv = v => v != null ? (v * 100).toFixed(1) + '%' : '-';

    const auSrc = (au.by_region2 && region && au.by_region2[region])
      ? au.by_region2[region] : au;

    const tdPp = (nv, yv) => {
      if (nv == null || yv == null) return `<td class="td-chg">-</td>`;
      const pp = (nv - yv) * 100;
      const cls = pp > 0 ? 'td-up' : pp < 0 ? 'td-dn' : '';
      return `<td class="td-chg ${cls}">${pp > 0 ? '+' : ''}${pp.toFixed(1)}%p</td>`;
    };
    [
      { lbl: `${meta.w0_label || 'W'} *`, now: auSrc.now?.w0?.[dayKey], yoy: auSrc.yoy?.w0?.[dayKey] },
      { lbl: `${meta.w1_label || 'W+1'} *`, now: auSrc.now?.w1?.[dayKey], yoy: auSrc.yoy?.w1?.[dayKey] },
      { lbl: `${meta.w2_label || 'W+2'} *`, now: auSrc.now?.w2?.[dayKey], yoy: auSrc.yoy?.w2?.[dayKey] },
    ].forEach(({ lbl, now: nv, yoy: yv }) => {
      tbody += `<tr style="color:#6b7280;font-style:italic">
        <td>${lbl}</td>
        <td>${fmtAdv(nv)}</td>
        <td>${fmtAdv(yv)}</td>
        <td>-</td>
        ${tdPp(nv, yv)}
      </tr>`;
    });
  }

  return `<table class="data-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}

/* ─── Region breakdown ─── */
function chgCell(v, vbase, isFirst, extraCls) {
  const sepClass = isFirst ? ' grp-sep' : '';
  const extra = extraCls ? ` ${extraCls}` : '';
  const c = pctChg(v, vbase);
  if (c == null) return `<td class="td-chg${sepClass}${extra}">-</td>`;
  const cls = c > 0 ? 'td-up' : c < 0 ? 'td-dn' : '';
  return `<td class="td-chg ${cls}${sepClass}${extra}">${c > 0 ? '+' : ''}${c.toFixed(1)}%</td>`;
}

function setRtSort(colKey, chgType) {
  if (_rtSortState && _rtSortState.key === colKey && _rtSortState.chg === chgType) {
    if (_rtSortState.dir === 'desc') _rtSortState.dir = 'asc';
    else _rtSortState = null;
  } else {
    _rtSortState = { key: colKey, chg: chgType, dir: 'desc' };
  }
  if (_rtStoredArgs) {
    const el = document.querySelector('.region-breakdown');
    if (el) el.outerHTML = buildRegionTable(_rtStoredArgs.rows, _rtStoredArgs.title, _rtStoredArgs.onClickFn);
  }
}

function sortRtRows(rows) {
  if (!_rtSortState) return rows;
  const { key, chg, dir } = _rtSortState;
  return [...rows].sort((a, b) => {
    const getChg = row => {
      const v = row.cur?.[key], base = chg === 'wow' ? row.prev?.[key] : row.yoy?.[key];
      return pctChg(v, base);
    };
    const ca = getChg(a) ?? (dir === 'desc' ? -Infinity : Infinity);
    const cb = getChg(b) ?? (dir === 'desc' ? -Infinity : Infinity);
    return dir === 'desc' ? cb - ca : ca - cb;
  });
}

function buildRegionTable(rows, title, onClickFn) {
  // metric 전환 시 정렬 초기화
  if (_rtLastMetric !== metric) { _rtSortState = null; _rtLastMetric = metric; }
  _rtStoredArgs = { rows, title, onClickFn };

  const colsByMetric = {
    revenue: [
      { key:'rev_per_car',  label:'대당매출',   fmt:'krw', suffix:'원' },
      { key:'gpm',          label:'GPM',         fmt:'pct', suffix:'' },
      { key:'opr_weekday',  label:'주중가동률',  fmt:'pct', suffix:'' },
      { key:'opr_weekend',  label:'주말가동률',  fmt:'pct', suffix:'' },
      { key:'use_count',    label:'이용건수',    fmt:'cnt', suffix:'건' },
      { key:'revenue',      label:'총매출',      fmt:'krw', suffix:'원' },
    ],
    waytype: [
      { key:'round_count',  label:'왕복', fmt:'cnt', suffix:'건' },
      { key:'oneway_count', label:'편도', fmt:'cnt', suffix:'건' },
      { key:'d2d_count',    label:'부름', fmt:'cnt', suffix:'건' },
      { key:'use_count',    label:'총이용', fmt:'cnt', suffix:'건' },
      { label:'0~4h', type:'simple', color:'#93c5fd',
        valueFn: r => { const t=(r?.u_0to4h||0)+(r?.u_4to8h||0)+(r?.u_8to24h||0)+(r?.u_24plus||0); return t?`${Math.round((r?.u_0to4h||0)/t*100)}%`:'-'; } },
      { label:'4~8h', type:'simple', color:'#3b82f6',
        valueFn: r => { const t=(r?.u_0to4h||0)+(r?.u_4to8h||0)+(r?.u_8to24h||0)+(r?.u_24plus||0); return t?`${Math.round((r?.u_4to8h||0)/t*100)}%`:'-'; } },
      { label:'8~24h', type:'simple', color:'#6d28d9',
        valueFn: r => { const t=(r?.u_0to4h||0)+(r?.u_4to8h||0)+(r?.u_8to24h||0)+(r?.u_24plus||0); return t?`${Math.round((r?.u_8to24h||0)/t*100)}%`:'-'; } },
      { label:'24h+', type:'simple', color:'#1e3a8a',
        valueFn: r => { const t=(r?.u_0to4h||0)+(r?.u_4to8h||0)+(r?.u_8to24h||0)+(r?.u_24plus||0); return t?`${Math.round((r?.u_24plus||0)/t*100)}%`:'-'; } },
    ],
    demand: [
      { key:'attempt',         label:'수요접속', fmt:'cnt', suffix:'건' },
      { key:'fail_rate',       label:'실패율',   fmt:'pct', suffix:'' },
      { key:'payment_attempt', label:'결제시도', fmt:'cnt', suffix:'건' },
      { key:'use_count',       label:'이용건수', fmt:'cnt', suffix:'건' },
    ],
    cost: [
      { key:'discount_rate', label:'할인율',   fmt:'pct', suffix:'' },
      { key:'use_count',     label:'이용건수', fmt:'cnt', suffix:'건' },
      { key:'rev_per_car',   label:'대당매출', fmt:'krw', suffix:'원' },
      { key:'revenue',       label:'총매출',   fmt:'krw', suffix:'원' },
    ],
  };
  const cols = colsByMetric[metric] || colsByMetric.revenue;
  const chgLbl = period === 'monthly' ? 'MoM' : 'WoW';

  // 현재 주차/월 레이블
  const ds = getDatasets();
  const _li = ds.futureFrom != null ? ds.futureFrom - 1 : ds.now.length - 1;
  const W1 = ds.now[_li];
  const valLabel = period === 'weekly'
    ? `W${W1?.isoweek || '-'}`
    : period === 'monthly' ? (ds.labels?.[_li] || '최근') : 'YTD';

  // 정렬 상태 표시 헬퍼
  const sortIcon = (key, chg) => {
    if (_rtSortState?.key === key && _rtSortState?.chg === chg)
      return _rtSortState.dir === 'desc' ? ' ▼' : ' ▲';
    return '';
  };
  const sortCls = (key, chg) =>
    `sub-c sort-th${_rtSortState?.key===key && _rtSortState?.chg===chg ? ' sort-active' : ''}`;

  const thead = `<thead>
    <tr>
      <th class="th-region-top"></th>
      ${cols.map(c => c.type === 'simple'
        ? `<th class="grp" colspan="1" style="color:${c.color||'#374151'}">${c.label}</th>`
        : `<th class="grp" colspan="3">${c.label}</th>`
      ).join('')}
    </tr>
    <tr>
      <th class="th-region-lbl">지역</th>
      ${cols.map(c => c.type === 'simple'
        ? `<th class="grp-sep sub-v" style="min-width:36px;text-align:center;border-right:none">비율</th>`
        : `<th class="grp-sep sub-v" style="text-align:right">${valLabel}</th><th class="${sortCls(c.key,'wow')} sub-c-mid" onclick="setRtSort('${c.key}','wow')">${chgLbl}${sortIcon(c.key,'wow')}</th><th class="${sortCls(c.key,'yoy')}" onclick="setRtSort('${c.key}','yoy')">YoY${sortIcon(c.key,'yoy')}</th>`
      ).join('')}
    </tr>
  </thead>`;

  const sorted = sortRtRows(rows);
  const tbody = sorted.map(row => {
    const { name, cur, prev, yoy, clickable } = row;
    const nameCell = clickable
      ? `<td onclick="${onClickFn}('${name}')">${name}</td>`
      : `<td style="cursor:default;font-weight:400;color:#374151">${name}</td>`;
    const dataCells = cols.map(c => {
      if (c.type === 'simple') {
        const valStr = c.valueFn ? c.valueFn(cur) : '-';
        return `<td class="td-val grp-sep" style="text-align:center;color:${c.color||'#111827'};font-size:10.5px">${valStr}</td>`;
      }
      const v  = cur  ? cur[c.key]  : null;
      const vp = prev ? prev[c.key] : null;
      const vy = yoy  ? yoy[c.key]  : null;
      const valStr = v == null ? '-' : (c.fmt === 'pct' ? `${(v*100).toFixed(1)}%` : fmt(v, c.fmt) + c.suffix);
      return `<td class="td-val grp-sep">${valStr}</td>${chgCell(v, vp, false, 'td-chg-mid')}${chgCell(v, vy, false)}`;
    }).join('');
    return `<tr>${nameCell}${dataCells}</tr>`;
  }).join('');

  const isClickable = onClickFn !== '';
  return `<div class="region-breakdown">
    <div class="region-breakdown-hdr">
      <span style="color:#0064FF;font-size:14px">▪</span>
      ${title}
      ${isClickable ? '<span class="hdr-sub">· 지역명 클릭 시 하위 상세</span>' : ''}
    </div>
    <div class="region-table-wrap">
      <table class="region-table">${thead}<tbody>${tbody}</tbody></table>
    </div>
  </div>`;
}

function buildRegionBreakdown(ds) {
  const r2data = D.weekly_region2 || [];
  if (!r2data.length) return '';

  const filtered = regionLevel === 1
    ? r2data.filter(r => r.region1 === region)
    : r2data;

  const now2 = filtered.filter(r => r.period_type === 'now');
  const yoy2 = filtered.filter(r => r.period_type === 'yoy');

  const regionMap = {};
  for (const r of now2) {
    if (!regionMap[r.region] || r.isoweek > regionMap[r.region].isoweek ||
        (r.isoweek === regionMap[r.region].isoweek && r.isoyear > regionMap[r.region].isoyear)) {
      regionMap[r.region] = r;
    }
  }
  const prevMap = {};
  for (const r of now2) {
    const cur = regionMap[r.region];
    if (cur && r.isoweek === cur.isoweek - 1) prevMap[r.region] = r;
  }
  const yoyMap = {};
  for (const r of yoy2) {
    if (!yoyMap[r.region] || r.isoweek > yoyMap[r.region].isoweek) yoyMap[r.region] = r;
  }

  const regions = Object.keys(regionMap).sort();
  if (!regions.length) return '';

  const rows = regions.map(rg => ({
    name: rg,
    cur: regionMap[rg],
    prev: prevMap[rg] || null,
    yoy: yoyMap[rg] || null,
    clickable: true,
  }));

  const title = regionLevel === 0 ? '시군구별 현황' : `${region} 시군구별 현황`;
  return buildRegionTable(rows, title, 'drillRegion2');
}

  }
  const prevMap = {};
  for (const r of now3) {

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
function getValues(rows, key) { return rows.map(r => r ? (r[key] ?? null) : null); }
function toDisplayVal(arr, f) {
  return arr.map(v => {
    if (v == null) return null;
    if (f === 'pct100') return parseFloat((v*100).toFixed(3));
    return v;
  });
}

function keyLabel(key) {
  const map = {
    rev_per_car:'대당매출', gpm:'GPM', revenue:'총매출', use_count:'이용건수',
    opr_weekday:'주중가동률', opr_weekend:'주말가동률',
    round_count:'왕복건수', round_rev_per_use:'왕복건당매출', round_avg_hours:'왕복이용시간',
    oneway_count:'편도건수', oneway_rev_per_use:'편도건당매출', oneway_avg_hours:'편도이용시간',
    d2d_count:'부름건수', d2d_rev_per_use:'부름건당매출', d2d_avg_hours:'부름이용시간',
    attempt:'수요시도', fail_rate:'실패율', car_count:'운영차량',
  };
  return map[key] || key;
}

function drawChart(id, cfg, ds) {
  const ctx = document.getElementById(id);
  if (!ctx) return;

  const nowColor = cfg.colors[0];
  const yoyColor = '#94a3b8';
  const nPoints = ds.labels.length;
  const showLabels = nPoints <= 12;
  const labelStep = nPoints <= 24 ? 2 : 4;
  const ptRadius = nPoints <= 12 ? 4 : 1;
  const isYtd = period === 'ytd';

  const datasets = [];
  cfg.keys.forEach((key, ki) => {
    const nowVals = toDisplayVal(getValues(ds.now, key), cfg.fmt);
    const yoyVals = toDisplayVal(getValues(ds.yoy, key), cfg.fmt);
    const color   = cfg.colors[ki] || cfg.colors[0];
    const yAxisID = ki === 0 ? 'y' : 'y2';
    const label   = keyLabel(key);

    // 현재연도 — 굵은 실선 + 연한 fill
    datasets.push({
      label: `${label} (2026)`, data: nowVals, borderColor: color,
      backgroundColor: `${color}18`, fill: ki === 0,
      tension: .25, pointRadius: ptRadius, pointHoverRadius: ptRadius + 2,
      borderWidth: 2.5, yAxisID,
      datalabels: {
        display: (ctx) => showLabels || ctx.dataIndex % labelStep === 0,
        anchor: 'top', align: 'top',
        font: { size: 8, weight: 'bold' }, color: color,
        formatter: v => v == null ? '' : fmtAxis(v, cfg.fmt),
        offset: 2,
      },
    });
    // YoY — 얇은 점선, 데이터라벨 없음
    datasets.push({
      label: `${label} (2025)`, data: yoyVals, borderColor: yoyColor,
      borderDash: [4, 3], backgroundColor: 'transparent', fill: false,
      tension: .25, pointRadius: nPoints <= 12 ? 2 : 0,
      borderWidth: 1.5, yAxisID,
      datalabels: { display: false },
    });
  });

  // Y축 범위: 모든 데이터(2026+2025) 최솟값~최댓값 기준, 10% 여백
  const allVals = datasets.flatMap(d => d.data).filter(v => v != null && isFinite(v));
  const yMin = allVals.length ? Math.min(...allVals) : 0;
  const yMax = allVals.length ? Math.max(...allVals) : 1;
  const yPad = (yMax - yMin) * 0.15 || yMax * 0.1 || 1;
  const ySugMin = yMin - yPad;
  const ySugMax = yMax + yPad;

  const scalesOpt = {
    x: { ticks: { font: { size: 10 } } },
    y: {
      position: 'left',
      suggestedMin: ySugMin,
      suggestedMax: ySugMax,
      ticks: { font: { size: 10 }, callback: v => fmtAxis(v, cfg.fmt) },
    },
  };
  if (cfg.dualY && cfg.fmt2) {
    scalesOpt.y2 = {
      position: 'right',
      grid: { drawOnChartArea: false },
      ticks: { font:{size:10}, callback: v => fmtAxis(v, cfg.fmt2) },
    };
  }

  // 사전가동률 연장 (utilToggle 차트, weekly/ytd 모드)
  let chartLabels = [...ds.labels];
  if (cfg.utilToggle && period === 'weekly' && D?.advance_util?.meta) {
    const au = D.advance_util;
    const meta = au.meta || {};
    const dayKey = cfg.keys[0] === 'opr_weekday' ? 'weekday' : 'weekend';
    const nPts = ds.now.length;
    const toDisp = v => v != null ? parseFloat((v * 100).toFixed(3)) : null;

    // region 필터에 맞는 데이터 선택 (region2 우선, 없으면 팀전체 '__all__')
    const auSrc = (au.by_region2 && region && au.by_region2[region])
      ? au.by_region2[region]
      : au;  // au.now/au.yoy = '__all__' 집계

    const advNowW0 = toDisp(auSrc.now?.w0?.[dayKey]);
    const advNowW1 = toDisp(auSrc.now?.w1?.[dayKey]);
    const advNowW2 = toDisp(auSrc.now?.w2?.[dayKey]);
    const advYoyW0 = toDisp(auSrc.yoy?.w0?.[dayKey]);
    const advYoyW1 = toDisp(auSrc.yoy?.w1?.[dayKey]);
    const advYoyW2 = toDisp(auSrc.yoy?.w2?.[dayKey]);

    if (advNowW0 != null || advNowW1 != null || advNowW2 != null) {
      const cw = meta.curr_week || '';
      chartLabels = [...ds.labels,
        `${meta.w0_label || ('W' + cw)} *`,
        `${meta.w1_label || ('W' + (cw + 1))} *`,
        `${meta.w2_label || ('W' + (cw + 2))} *`];

      // 기존 datasets 확장 (null 패딩 3개)
      datasets.forEach(d => { d.data = [...d.data, null, null, null]; });

      const ADV_COLOR_NOW = '#f97316'; // 주황 — 사전가동(현재) 전용
      const ADV_COLOR_YOY = '#fdba74'; // 연주황 — 사전가동(YoY) 전용

      // 마지막 실적 → W → W+1 → W+2 연결선 (주황 점선)
      const lastNow = datasets[0]?.data[nPts - 1] ?? null;
      datasets.push({
        label: `사전가동 (${meta.curr_year || 2026})`,
        data: [...Array(nPts - 1).fill(null), lastNow, advNowW0, advNowW1, advNowW2],
        borderColor: ADV_COLOR_NOW,
        borderDash: [5, 4],
        backgroundColor: 'transparent',
        fill: false,
        tension: .2,
        pointRadius: 4,
        pointStyle: 'circle',
        borderWidth: 2,
        yAxisID: 'y',
        datalabels: {
          display: ctx => ctx.dataIndex >= nPts,
          anchor: 'top', align: 'top',
          font: { size: 8, weight: 'bold' }, color: ADV_COLOR_NOW,
          formatter: v => v == null ? '' : fmtAxis(v, cfg.fmt),
          offset: 2,
        },
      });

      // YoY 사전 (연주황 점선)
      if (advYoyW0 != null || advYoyW1 != null || advYoyW2 != null) {
        const lastYoy = datasets[1]?.data[nPts - 1] ?? null;
        datasets.push({
          label: `사전가동 (${(meta.curr_year || 2026) - 1})`,
          data: [...Array(nPts - 1).fill(null), lastYoy, advYoyW0, advYoyW1, advYoyW2],
          borderColor: ADV_COLOR_YOY,
          borderDash: [4, 3],
          backgroundColor: 'transparent',
          fill: false,
          tension: .2,
          pointRadius: 0,
          borderWidth: 1.5,
          yAxisID: 'y',
          datalabels: { display: false },
        });
      }
    }
  }

  // YTD 미래 참고 구간 음영 플러그인
  const futureFrom = isYtd && ds.futureFrom != null ? ds.futureFrom : null;
  const ytdShadePlugin = futureFrom != null ? [{
    id: 'ytdShade',
    afterDraw(chart) {
      const { ctx: c, chartArea: { top, bottom, left, right }, scales: { x } } = chart;
      if (!x || futureFrom >= chart.data.labels.length) return;
      const xStart = x.getPixelForValue(futureFrom);
      if (xStart >= right) return;
      c.save();
      c.fillStyle = 'rgba(148,163,184,0.10)';
      c.fillRect(xStart, top, right - xStart, bottom - top);
      // 구분선
      c.beginPath();
      c.strokeStyle = 'rgba(148,163,184,0.5)';
      c.setLineDash([4, 3]);
      c.lineWidth = 1;
      c.moveTo(xStart, top);
      c.lineTo(xStart, bottom);
      c.stroke();
      c.setLineDash([]);
      // 레이블
      c.font = '9px sans-serif';
      c.fillStyle = 'rgba(100,116,139,0.85)';
      c.textAlign = 'left';
      c.fillText('YoY 참고', xStart + 4, top + 10);
      c.restore();
    }
  }] : [];

  const instance = new Chart(ctx, {
    type: 'line',
    data: { labels: chartLabels, datasets },
    plugins: ytdShadePlugin,
    options: {
      responsive: true, maintainAspectRatio: false, animation: { duration: 200 },
      layout: { padding: { top: 24 } },
      plugins: {
        legend: { labels: { font: { size: 10 }, boxWidth: 10, usePointStyle: true } },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.raw;
              if (v == null) return `${ctx.dataset.label}: -`;
              return `${ctx.dataset.label}: ${fmtAxis(v, cfg.fmt)}`;
            }
          }
        },
        datalabels: {},
      },
      scales: scalesOpt,
    },
  });
  charts.push(instance);
}

function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }
